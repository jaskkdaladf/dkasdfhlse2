        {/* 메모 */}
        <button onClick={()=>setExpandMemo(!expandMemo)}
          onMouseEnter={e=>e.currentTarget.style.background=C.borderLight}
          onMouseLeave={e=>e.currentTarget.style.background=C.surfaceAlt}
          style={{ ...btnBase, marginBottom:expandMemo?8:6 }}>
          {expandMemo?"▲ 메모 접기":"▼ 메모 / 레퍼런스"}
        </button>
        {expandMemo && (
          <textarea value={activeEp.memo||""} onChange={e=>updateEp(activeEp.id,{memo:e.target.value})}
            placeholder="이 화에 대한 메모, 레퍼런스 링크, 수정 요청 등..."
            style={{ width:"100%", minHeight:80, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:9, color:C.text, fontSize:12, padding:"10px 12px", resize:"vertical", marginBottom:6, fontFamily:"inherit", lineHeight:1.6 }} />
        )}

        {/* 페이지 체크 */}
        <button onClick={()=>setExpandPageCheck(!expandPageCheck)}
          onMouseEnter={e=>e.currentTarget.style.background=C.borderLight}
          onMouseLeave={e=>e.currentTarget.style.background=C.surfaceAlt}
          style={{ ...btnBase, marginBottom:expandPageCheck?8:6 }}>
          {expandPageCheck?"▲ 페이지 체크 접기":"▼ 페이지별 단계 체크"}
        </button>
        {expandPageCheck && (
          <div style={{ marginBottom:6 }}>
              {/* 전체 일괄 버튼 */}
              <div style={{ display:"flex", gap:6, marginBottom:8 }}>
                <button onClick={checkAllPages} style={{ background:work.color+"22", border:`1px solid ${work.color+"88"}`, borderRadius:7, color:work.color, fontSize:11, padding:"4px 12px", cursor:"pointer", fontWeight:700 }}>전체 완료</button>
                <button onClick={uncheckAllPages} style={{ background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:7, color:C.textMuted, fontSize:11, padding:"4px 12px", cursor:"pointer" }}>전체 초기화</button>
              </div>
              {/* 가로 그리드: 행=단계, 열=페이지 — 카드 너비에 맞게 flex */}
              <div onMouseLeave={handleMouseUp} onMouseUp={handleMouseUp}>
                  {/* 헤더 행: 단계명 너비 + 페이지 번호들 */}
                  <div style={{ display:"flex", gap:2, marginBottom:4, alignItems:"center" }}>
                    <div style={{ width:46, flexShrink:0 }} />
                    {pages.map(p => {
                      const allDone = STAGES.every(s => pageCheck[`${p}-${s}`]);
                      return (
                        <div key={p} style={{ flex:1, textAlign:"center", minWidth:0 }}>
                          <span style={{ color:allDone?work.color:C.textMuted, fontSize:8, fontFamily:"monospace", fontWeight:allDone?700:400 }}>{p}p</span>
                        </div>
                      );
                    })}
                  </div>
                  {/* 단계 행들 */}
                  {STAGES.map(s => {
                    const stageDone = pages.every(p => pageCheck[`${p}-${s}`]);
                    return (
                      <div key={s} style={{ display:"flex", gap:2, marginBottom:2, alignItems:"center" }}>
                        {/* 단계명 버튼 */}
                        <button
                          onClick={()=>{
                            const nc={...pageCheck};
                            if(stageDone){ pages.forEach(p=>{ delete nc[`${p}-${s}`]; }); }
                            else { pages.forEach(p=>{ nc[`${p}-${s}`]=true; }); }
                            const np={...sp};
                            STAGES.forEach(st=>{ const cnt=pages.filter(p=>nc[`${p}-${st}`]).length; np[st]=pages.length>0?Math.round((cnt/pages.length)*100):0; });
                            const cp=pages.filter(p=>STAGES.every(st=>nc[`${p}-${st}`])).length;
                            updateEp(activeEp.id,{pageCheck:nc,stageProgress:np,completedPages:cp});
                          }}
                          title={stageDone?`${s} 전체 해제`:`${s} 전체 완료`}
                          style={{ width:46, flexShrink:0, height:22, borderRadius:4, border:`1px solid ${stageDone?work.color+"88":C.border}`, background:stageDone?work.color+"22":C.surfaceAlt, cursor:"pointer", fontSize:9, color:stageDone?work.color:C.textMuted, fontWeight:700, padding:0, transition:"all 0.1s", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                          {s}
                        </button>
                        {/* 페이지 셀들 */}
                        {pages.map(p => {
                          const checked = !!pageCheck[`${p}-${s}`];
                          return (
                            <button key={p}
                              onMouseDown={e=>handleCellMouseDown(p,s,e)}
                              onMouseEnter={()=>handleCellMouseEnter(p,s)}
                              onTouchStart={()=>handleCellMouseDown(p,s)}
                              onTouchMove={()=>handleCellMouseEnter(p,s)}
                              onTouchEnd={handleMouseUp}
                              style={{ flex:1, minWidth:0, height:22, borderRadius:4, border:`1px solid ${checked?work.color+"99":C.border}`, background:checked?work.color+"33":C.bg, cursor:"pointer", transition:"all 0.1s", display:"flex", alignItems:"center", justifyContent:"center", userSelect:"none" }}>
                              {checked && <span style={{ color:work.color, fontSize:8, fontWeight:700 }}>✓</span>}
                            </button>
                          );
                        })}
                      </div>
                    );
                  })}
              </div>
          </div>
        )}

        {/* 단계별 진행률 — 인라인 요약 */}
        <div style={{ display:"flex", flexWrap:"wrap", gap:"4px 8px", marginTop:6 }}>
          {STAGES.map(stage => (
            <span key={stage} style={{ fontSize:10, color:sp[stage]===100?work.color:C.textMuted, fontFamily:"monospace" }}>
              {stage} <span style={{ fontWeight:700 }}>{sp[stage]}%</span>
            </span>
          ))}
        </div>
        </>}
        </>}

        {showColorPicker && <ColorPickerModal color={work.color} onSelect={c=>onUpdate({...work,color:c})} onClose={()=>setShowColorPicker(false)} />}
        {/* 장기휴재 설정 패널 */}
        {showHiatusEdit && (
          <div style={{ background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:12, padding:"14px 16px", marginTop:10, marginBottom:6 }}>
            <div style={{ color:C.text, fontWeight:700, fontSize:13, marginBottom:10 }}>장기휴재 기간 설정</div>
            <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
              <label style={{ color:C.textMuted, fontSize:11 }}>시작</label>
              <input type="date" value={work.longHiatusStart||""} onChange={e=>{
                const newStart = e.target.value;
                onUpdate({...work, longHiatusStart: newStart, hiatus: !!newStart});
              }} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:7, color:C.text, fontSize:12, padding:"4px 8px" }} />
              <label style={{ color:C.textMuted, fontSize:11 }}>종료</label>
              <input type="date" value={work.longHiatusEnd||""} onChange={e=>{
                onUpdate({...work, longHiatusEnd: e.target.value});
              }} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:7, color:C.text, fontSize:12, padding:"4px 8px" }} />
              <button onClick={()=>onUpdate({...work, longHiatusStart:"", longHiatusEnd:"", hiatus:false})}
                style={{ background:"transparent", border:`1px solid ${C.border}`, borderRadius:7, color:C.textMuted, fontSize:11, padding:"4px 10px", cursor:"pointer" }}>초기화</button>
            </div>
            {work.longHiatusStart && work.longHiatusEnd && (
              <div style={{ color:"#9E7BB5", fontSize:11, marginTop:8, fontWeight:600 }}>
                📅 {work.longHiatusStart} ~ {work.longHiatusEnd} 장기휴재
              </div>
            )}
          </div>
        )}
        {showArchiveConfirm && (
          <div onClick={()=>setShowArchiveConfirm(false)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.3)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center" }}>
            <div onClick={e=>e.stopPropagation()} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:16, padding:"24px 28px", minWidth:280, boxShadow:"0 8px 32px rgba(0,0,0,0.14)", textAlign:"center" }}>
              <div style={{ fontSize:22, marginBottom:10 }}>✓</div>
              <div style={{ color:C.text, fontWeight:700, fontSize:15, marginBottom:6 }}>{work.title} {activeEp?.label} 완료</div>
              <div style={{ color:C.textMuted, fontSize:12, marginBottom:20 }}>완료 아카이브로 보낼까요?</div>
              <div style={{ display:"flex", gap:8, justifyContent:"center" }}>
                <button onClick={()=>setShowArchiveConfirm(false)} style={{ background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:8, color:C.textMid, fontSize:13, padding:"7px 18px", cursor:"pointer" }}>취소</button>
                <button onClick={confirmMarkDone} style={{ background:work.color, border:"none", borderRadius:8, color:"#fff", fontSize:13, fontWeight:700, padding:"7px 18px", cursor:"pointer" }}>아카이브로 보내기</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── CalendarTab ──────────────────────────────────────
const DOT_PLAN   = "#6E9EAD";
const DOT_TASK   = "#C49A6C";

function CalendarTab({ works, todos, setTodos, tasks, setTasks, planCategories, taskTypes, schedules, researches }) {
  const C = getC();
  const today = new Date();
  const [year, setYear] = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth());
  const [popup, setPopup] = useState(null); // { dayStr }

  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

  // 날짜별 dot 데이터 집계
  const dotsByDay = useMemo(() => {
    const map = {};
    const add = (day, dot) => { if(!map[day]) map[day]=[]; map[day].push(dot); };
    // 화수 마감 + 공개(마감+1일)
    works.forEach(w => (w.episodes||[]).forEach(ep => {
      if (ep.deadline && !ep.doneAt) {
        add(ep.deadline, { type:"deadline", color:w.color, label:`${w.title} ${ep.label} 마감`, workColor:w.color });
        // 공개일 = 마감일 + 1일
        const dlDate = new Date(ep.deadline);
        dlDate.setDate(dlDate.getDate() + 1);
        const uploadDay = dlDate.toISOString().slice(0,10);
        add(uploadDay, { type:"upload", color:w.color, label:`${w.title} ${ep.label} 공개`, workColor:w.color });
      }
    }));
    // 화수 완료
    works.forEach(w => (w.episodes||[]).forEach(ep => {
      if (ep.doneAt) add(ep.doneAt.slice(0,10), { type:"done", color:w.color, label:`${w.title} ${ep.label} 완료`, workColor:w.color });
    }));
    // schedules 기반 공개 예정은 works 기반으로 대체됨
    // PSD 마감일 (다음달 15일, 매월)
    const monthKey = `${year}-${String(month+1).padStart(2,'0')}`;
    const psdDate = `${year}-${String(month+2).padStart(2,'0')}-15`;
    add(psdDate, { type:"psd", color:"#7B89BE", label:"PSD 마감" });
    // 세무사 연락일 (매월 15일)
    const accountantDate = `${year}-${String(month+1).padStart(2,'0')}-15`;
    add(accountantDate, { type:"accountant", color:"#9E7BB5", label:"사업소득지급대장" });
    // 자료조사 마감일
    (researches||[]).forEach(r => {
      if (r.deadline) add(r.deadline, { type:"research", color:"#C49A6C", label:`${r.title} 마감` });
    });
    // 장기휴재 기간은 캘린더에 표시하지 않음
    // 플랜 (dueDate 기준, 없으면 createdAt)
    todos.forEach(t => {
      const day = t.dueDate || t.createdAt?.slice(0,10);
      if (day) add(day, { type:"plan", color:DOT_PLAN, label:t.text, done:t.done });
    });
    // 업무 (due 기준)
    tasks.forEach(t => {
      if (t.due) add(t.due, { type:"task", color:DOT_TASK, label:`${t.name} — ${t.task}`, status:t.status });
    });
    return map;
  }, [works, todos, tasks, schedules, researches, year, month]);

  const prevMonth = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const nextMonth = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };

  // 월요일 시작: 일요일(0)→6, 월(1)→0, 화(2)→1 ...
  const rawFirstDay = new Date(year, month, 1).getDay();
  const firstDayMon = (rawFirstDay + 6) % 7;
  const days = [];
  for(let i=0;i<firstDayMon;i++) days.push(null);
  for(let i=1;i<=daysInMonth;i++) days.push(i);

  return (
    <div>
      {/* 헤더 */}
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
        <div style={{ color:C.text, fontWeight:700, fontSize:17 }}>캘린더</div>
        <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:8 }}>
          <button onClick={prevMonth} style={{ background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:7, color:C.textMid, fontSize:13, padding:"4px 10px", cursor:"pointer" }}>‹</button>
          <span style={{ color:C.text, fontWeight:700, fontSize:14, minWidth:90, textAlign:"center" }}>{year}년 {month+1}월</span>
          <button onClick={nextMonth} style={{ background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:7, color:C.textMid, fontSize:13, padding:"4px 10px", cursor:"pointer" }}>›</button>
        </div>
      </div>

      {/* 범례 */}
      <div style={{ display:"flex", gap:14, flexWrap:"wrap", marginBottom:14, padding:"8px 14px", background:C.surface, border:`1px solid ${C.border}`, borderRadius:10 }}>
        {[
          { color:"#7A9E7E", label:"화수 완료" },
          { color:"#B07070", label:"화수 마감" },
          { color:"#6E9EAD", label:"공개" },
          { color:"#7B89BE", label:"PSD 마감" },
          { color:"#9E7BB5", label:"세무사" },
          { color:"#C49A6C", label:"자료 마감" },
          { color:DOT_TASK,  label:"업무" },
        ].map(({ color, label }) => (
          <div key={label} style={{ display:"flex", alignItems:"center", gap:5 }}>
            <div style={{ width:8, height:8, borderRadius:"50%", background:color }} />
            <span style={{ color:C.textMuted, fontSize:11 }}>{label}</span>
          </div>
        ))}
        <span style={{ color:C.textMuted, fontSize:11, marginLeft:"auto" }}>날짜 클릭 → 상세 / 추가</span>
      </div>

      {/* 달력 그리드 */}
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:16, padding:14, marginBottom:16 }}>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3, marginBottom:8 }}>
          {["월","화","수","목","금","토","일"].map((d,i) => (
            <div key={d} style={{ textAlign:"center", color:i===5?"#6E9EAD":i===6?"#C17B7B":C.textMuted, fontSize:11, fontWeight:700, paddingBottom:4 }}>{d}</div>
          ))}
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3 }}>
          {days.map((day, i) => {
            if (!day) return <div key={`e${i}`} />;
            const dayStr = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const events = dotsByDay[dayStr] || [];
            const isToday = dayStr === todayStr;
            return (
              <div key={day} onClick={()=>setPopup(dayStr)}
                style={{ minHeight:64, background:isToday?C.surfaceAlt:C.bg, border:`1px solid ${isToday?C.accent+"44":C.borderLight}`, borderRadius:8, padding:"5px 5px 4px", cursor:"pointer", transition:"background 0.1s", overflow:"hidden" }}
                onMouseEnter={e=>e.currentTarget.style.background=C.surfaceAlt}
                onMouseLeave={e=>e.currentTarget.style.background=isToday?C.surfaceAlt:C.bg}>
                <div style={{ color:isToday?C.accent:C.textMid, fontSize:11, fontWeight:isToday?700:400, marginBottom:3 }}>{day}</div>
                <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
                  {events.slice(0,4).map((ev, j) => (
                    <div key={j} style={{ background:ev.color+"22", borderLeft:`2px solid ${ev.color}`, borderRadius:"0 3px 3px 0", padding:"1px 4px", fontSize:9, color:ev.color, fontWeight:600, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                      {ev.label}
                    </div>
                  ))}
                  {events.length > 4 && <div style={{ fontSize:9, color:C.textMuted, paddingLeft:4 }}>+{events.length-4}</div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* 날짜 클릭 팝업 */}
      {popup && (
        <CalendarPopup
          dayStr={popup}
          onClose={()=>setPopup(null)}
          works={works}
          todos={todos} setTodos={setTodos}
          tasks={tasks} setTasks={setTasks}
          planCategories={planCategories}
          taskTypes={taskTypes}
          dotsByDay={dotsByDay}
        />
      )}
    </div>
  );
}

// ─── CalendarPopup ────────────────────────────────────
function CalendarPopup({ dayStr, onClose, works, todos, setTodos, tasks, setTasks, planCategories, taskTypes, dotsByDay }) {
  const C = getC();
  const [addTab, setAddTab] = useState("plan"); // "plan" | "task"
  const [planForm, setPlanForm] = useState({ workId:works[0]?.id||"", catId:"", text:"", dueDate:dayStr });
  const [taskForm, setTaskForm] = useState({ workId:works[0]?.id||"", typeId:taskTypes[0]?.id||"", name:"", task:"", due:dayStr, priority:"보통", memo:"" });

  const sel = { background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:7, color:C.textMid, padding:"5px 8px", fontSize:12, cursor:"pointer" };
  const statusColor = { "대기":"#C49A6C", "진행중":"#6E9EAD", "완료":"#7A9E7E" };
  const priorityStyle = {
    "긴급": { bg:"#F5E8E8", color:"#B07070", border:"#DDB8B8" },
    "보통": { bg:C.surfaceAlt, color:C.textMuted, border:C.border },
    "여유": { bg:"#EEF8EE", color:"#7A9E7E", border:"#B8D8B8" },
  };

  const dayDots = dotsByDay[dayStr] || [];
  const epDeadlines = dayDots.filter(d => d.type==="deadline");
  const epDone      = dayDots.filter(d => d.type==="done");
  const dayTodos    = todos.filter(t => (t.dueDate||t.createdAt?.slice(0,10))===dayStr);
  const dayTasks    = tasks.filter(t => t.due===dayStr);

  const addPlan = () => {
    if (!planForm.text.trim()) return;
    setTodos(prev => [...prev, { id:Date.now(), workId:Number(planForm.workId), text:planForm.text.trim(), done:false, catId:planForm.catId, dueDate:planForm.dueDate, createdAt:new Date().toISOString() }]);
    setPlanForm(f => ({...f, text:""}));
  };

  const addTask = () => {
    if (!taskForm.name.trim() || !taskForm.task.trim()) return;
    setTasks(prev => [...prev, { ...taskForm, id:Date.now(), status:"대기", workId:Number(taskForm.workId), createdAt:new Date().toISOString() }]);
    setTaskForm(f => ({...f, name:"", task:"", memo:""}));
  };

  const dateLabel = new Date(dayStr+"T00:00:00").toLocaleDateString("ko-KR", { month:"long", day:"numeric", weekday:"short" });

  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.35)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:20, padding:24, width:"min(520px,92vw)", maxHeight:"85vh", overflowY:"auto", boxShadow:"0 12px 40px rgba(0,0,0,0.15)" }}>

        {/* 팝업 헤더 */}
        <div style={{ display:"flex", alignItems:"center", marginBottom:18 }}>
          <div style={{ color:C.text, fontWeight:700, fontSize:16 }}>{dateLabel}</div>
          <button onClick={onClose} style={{ marginLeft:"auto", background:"none", border:"none", color:C.textMuted, cursor:"pointer", fontSize:20, lineHeight:1 }}>×</button>
        </div>

        {/* 이날 항목 목록 */}
        {(epDeadlines.length>0 || epDone.length>0 || dayTodos.length>0 || dayTasks.length>0) && (
          <div style={{ marginBottom:20 }}>
            <div style={{ color:C.textMuted, fontSize:11, fontWeight:700, marginBottom:10 }}>이날 일정</div>

            {epDeadlines.map((d,i) => (
              <div key={i} style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 11px", background:"#F5E8E822", border:"1px solid #DDB8B8", borderRadius:9, marginBottom:6 }}>
                <div style={{ width:7, height:7, borderRadius:"50%", background:d.workColor }} />
                <span style={{ color:"#B07070", fontSize:12 }}>⏰ {d.label}</span>
              </div>
            ))}
            {epDone.map((d,i) => (
              <div key={i} style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 11px", background:`${d.workColor}11`, border:`1px solid ${d.workColor}44`, borderRadius:9, marginBottom:6 }}>
                <div style={{ width:7, height:7, borderRadius:"50%", background:d.workColor }} />
                <span style={{ color:d.workColor, fontSize:12, fontWeight:700 }}>✓ {d.label}</span>
              </div>
            ))}
            {dayTodos.map(t => {
              const work = works.find(w=>w.id===t.workId);
              const cat  = planCategories.find(c=>c.id===t.catId);
              return (
                <div key={t.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 11px", background:`${DOT_PLAN}11`, border:`1px solid ${DOT_PLAN}44`, borderRadius:9, marginBottom:6 }}>
                  <div style={{ width:7, height:7, borderRadius:"50%", background:DOT_PLAN, opacity:t.done?0.4:1 }} />
                  <span style={{ color:C.text, fontSize:12, flex:1, textDecoration:t.done?"line-through":"none", opacity:t.done?0.5:1 }}>{t.text}</span>
                  {cat && <span style={{ color:cat.color, fontSize:10 }}>{cat.label}</span>}
                  {work && <span style={{ color:C.textMuted, fontSize:10 }}>{work.title}</span>}
                  <button onClick={()=>setTodos(p=>p.map(x=>x.id===t.id?{...x,done:!x.done,doneAt:!x.done?new Date().toISOString():undefined}:x))}
                    style={{ background:"none", border:`1px solid ${DOT_PLAN}66`, borderRadius:5, color:DOT_PLAN, fontSize:10, padding:"1px 6px", cursor:"pointer" }}>{t.done?"↩":"✓"}</button>
                </div>
              );
            })}
            {dayTasks.map(t => {
              const type = taskTypes.find(x=>x.id===t.typeId);
              return (
                <div key={t.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 11px", background:`${DOT_TASK}11`, border:`1px solid ${DOT_TASK}44`, borderRadius:9, marginBottom:6 }}>
                  <div style={{ width:7, height:7, borderRadius:"50%", background:DOT_TASK }} />
                  <span style={{ color:C.textMid, fontSize:11, fontWeight:700 }}>{t.name}</span>
                  <span style={{ color:C.text, fontSize:12, flex:1 }}>{t.task}</span>
                  {type && <span style={{ color:type.color, fontSize:10 }}>{type.label}</span>}
                  <span style={{ color:statusColor[t.status]||C.textMuted, fontSize:10, fontWeight:700 }}>{t.status}</span>
                </div>
              );
            })}
          </div>
        )}

        {/* 추가 탭 */}
        <div style={{ borderTop:`1px solid ${C.border}`, paddingTop:16 }}>
          <div style={{ display:"flex", gap:6, marginBottom:14 }}>
            {[["plan","플랜 추가"],["task","업무 추가"]].map(([v,l]) => (
              <button key={v} onClick={()=>setAddTab(v)}
                style={{ background:addTab===v?C.accent:"transparent", border:`1px solid ${addTab===v?C.accent:C.border}`, borderRadius:8, color:addTab===v?"#fff":C.textMid, fontSize:12, fontWeight:addTab===v?700:400, padding:"5px 14px", cursor:"pointer", transition:"all 0.15s" }}>{l}</button>
            ))}
          </div>

          {addTab==="plan" && (
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
                <select value={planForm.workId} onChange={e=>setPlanForm(f=>({...f,workId:e.target.value}))} style={sel}>
                  {works.map(w=><option key={w.id} value={w.id}>{w.title}</option>)}
                </select>
                <select value={planForm.catId} onChange={e=>setPlanForm(f=>({...f,catId:e.target.value}))} style={sel}>
                  <option value="">담당자 없음</option>
                  {planCategories.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
                </select>
                <input type="date" value={planForm.dueDate} onChange={e=>setPlanForm(f=>({...f,dueDate:e.target.value}))} style={{...sel}} />
              </div>
              <div style={{ display:"flex", gap:7 }}>
                <input value={planForm.text} onChange={e=>setPlanForm(f=>({...f,text:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addPlan()} placeholder="할 작업 입력..."
                  style={{ flex:1, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:9, color:C.text, fontSize:13, padding:"8px 12px" }} />
                <button onClick={addPlan} style={{ background:C.accent, border:"none", borderRadius:9, color:"#fff", fontWeight:700, fontSize:18, padding:"8px 15px", cursor:"pointer" }}>+</button>
              </div>
            </div>
          )}

          {addTab==="task" && (
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
                <select value={taskForm.workId} onChange={e=>setTaskForm(f=>({...f,workId:e.target.value}))} style={sel}>
                  {works.map(w=><option key={w.id} value={w.id}>{w.title}</option>)}
                </select>
                <select value={taskForm.typeId} onChange={e=>setTaskForm(f=>({...f,typeId:e.target.value}))} style={sel}>
                  {taskTypes.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
                </select>
                <select value={taskForm.priority} onChange={e=>setTaskForm(f=>({...f,priority:e.target.value}))}
                  style={{...sel, color:priorityStyle[taskForm.priority].color, background:priorityStyle[taskForm.priority].bg}}>
                  <option value="긴급">🔴 긴급</option><option value="보통">🟡 보통</option><option value="여유">🟢 여유</option>
                </select>
                <input type="date" value={taskForm.due} onChange={e=>setTaskForm(f=>({...f,due:e.target.value}))} style={{...sel}} />
              </div>
              <div style={{ display:"flex", gap:7 }}>
                <input value={taskForm.name} onChange={e=>setTaskForm(f=>({...f,name:e.target.value}))} placeholder="이름"
                  style={{ width:80, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:9, color:C.text, fontSize:13, padding:"8px 10px" }} />
                <input value={taskForm.task} onChange={e=>setTaskForm(f=>({...f,task:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addTask()} placeholder="작업 내용"
                  style={{ flex:1, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:9, color:C.text, fontSize:13, padding:"8px 12px" }} />
                <button onClick={addTask} style={{ background:C.accent, border:"none", borderRadius:9, color:"#fff", fontWeight:700, fontSize:18, padding:"8px 15px", cursor:"pointer" }}>+</button>
              </div>
              <input value={taskForm.memo} onChange={e=>setTaskForm(f=>({...f,memo:e.target.value}))} placeholder="메모 (선택)"
                style={{ background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:9, color:C.text, fontSize:12, padding:"7px 12px" }} />
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── WorkMgmtTab ──────────────────────────────────────
function WorkMgmtTab({ works, tasks, setTasks, taskTypes, setTaskTypes, taskTypeTitle, setTaskTypeTitle }) {
  const C = getC();
  const [form, setForm] = useState({ workId:works[0]?.id||"", typeId:taskTypes[0]?.id||"", name:"", task:"", due:"", priority:"보통", memo:"" });
  const [editingTypeId, setEditingTypeId] = useState(null);
  const [editingTypeVal, setEditingTypeVal] = useState("");
  const [showTypeManager, setShowTypeManager] = useState(false);
  const [newTypeName, setNewTypeName] = useState("");
  const [sortBy, setSortBy] = useState("등록순");
  const [editingTaskId, setEditingTaskId] = useState(null);
  const [editingTaskVal, setEditingTaskVal] = useState("");
  const [editingTitleMode, setEditingTitleMode] = useState(false);
  const [titleVal, setTitleVal] = useState(taskTypeTitle);

  const sel = { background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:8, color:C.textMid, padding:"6px 10px", fontSize:12, cursor:"pointer" };
  const statusColor = { "대기":"#C49A6C", "진행중":"#6E9EAD", "완료":"#7A9E7E" };
  const priorityStyle = {
    "긴급": { bg:"#F5E8E8", color:"#B07070", border:"#DDB8B8" },
    "보통": { bg:`${C.surfaceAlt}`, color:C.textMuted, border:C.border },
    "여유": { bg:"#EEF8EE", color:"#7A9E7E", border:"#B8D8B8" },
  };
  const priorityOrder = { "긴급":0, "보통":1, "여유":2 };

  const addTask = () => {
    if (!form.name.trim() || !form.task.trim()) return;
    setTasks(prev => [...prev, { ...form, id:Date.now(), status:"대기", workId:Number(form.workId), createdAt:new Date().toISOString() }]);
    setForm(f => ({...f, name:"", task:"", due:"", memo:""}));
  };
  const addType = () => {
    if (!newTypeName.trim()) return;
    setTaskTypes(prev => [...prev, { id:"type_"+Date.now(), label:newTypeName.trim(), color:PRESET_COLORS[prev.length%PRESET_COLORS.length] }]);
    setNewTypeName("");
  };
  const removeType = id => { setTaskTypes(prev=>prev.filter(t=>t.id!==id)); setTasks(prev=>prev.filter(t=>t.typeId!==id)); };
  const saveTypeName = id => { if(editingTypeVal.trim()) setTaskTypes(prev=>prev.map(t=>t.id===id?{...t,label:editingTypeVal.trim()}:t)); setEditingTypeId(null); };
  const saveTypeTitle = () => { if(titleVal.trim()) setTaskTypeTitle(titleVal.trim()); setEditingTitleMode(false); };

  // 완료 처리 → doneAt 기록 (아카이브에서 걸러짐)
  const setStatus = (id, status) => setTasks(prev => prev.map(t => t.id===id ? {...t, status, doneAt: status==="완료" ? new Date().toISOString() : t.doneAt} : t));

  const active = useMemo(() => {
    const list = tasks.filter(t => t.status !== "완료");
    if (sortBy==="마감일순") return [...list].sort((a,b)=>{ if(!a.due) return 1; if(!b.due) return -1; return a.due.localeCompare(b.due); });
    if (sortBy==="중요도순") return [...list].sort((a,b)=>(priorityOrder[a.priority??"보통"]||1)-(priorityOrder[b.priority??"보통"]||1));
    if (sortBy==="가나다순") return [...list].sort((a,b)=>a.name.localeCompare(b.name,"ko"));
    return list;
  }, [tasks, sortBy]);

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:18, flexWrap:"wrap" }}>
        <div style={{ color:C.text, fontWeight:700, fontSize:17 }}>업무 관리</div>
        <div style={{ display:"flex", gap:4, marginLeft:"auto" }}>
          {["등록순","마감일순","중요도순","가나다순"].map(s => (
            <button key={s} onClick={()=>setSortBy(s)}
              style={{ background:sortBy===s?C.accent:"transparent", border:`1px solid ${sortBy===s?C.accent:C.border}`, borderRadius:7, color:sortBy===s?"#fff":C.textMid, fontSize:11, padding:"4px 9px", cursor:"pointer", transition:"all 0.15s" }}>{s}</button>
          ))}
        </div>
        <button onClick={()=>setShowTypeManager(!showTypeManager)} onMouseEnter={e=>e.currentTarget.style.background=C.borderLight} onMouseLeave={e=>e.currentTarget.style.background=C.surfaceAlt} style={{ background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:8, color:C.textMuted, fontSize:11, padding:"4px 11px", cursor:"pointer" }}>{showTypeManager?"▲ 닫기":"⚙ 유형"}</button>
      </div>

      {showTypeManager && (
        <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:14, padding:"14px 16px", marginBottom:18 }}>
          {/* 타이틀 변경 */}
          <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:12 }}>
            {editingTitleMode
              ? <input autoFocus value={titleVal} onChange={e=>setTitleVal(e.target.value)} onBlur={saveTypeTitle} onKeyDown={e=>e.key==="Enter"&&saveTypeTitle()}
                  style={{ flex:1, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:7, color:C.text, fontSize:13, fontWeight:700, padding:"3px 9px" }} />
              : <span onClick={()=>{setEditingTitleMode(true);setTitleVal(taskTypeTitle);}} style={{ color:C.text, fontSize:13, fontWeight:700, cursor:"text", borderBottom:`1px dashed ${C.border}`, paddingBottom:1 }}>{taskTypeTitle}</span>
            }
            <span style={{ color:C.textMuted, fontSize:10 }}>클릭해서 타이틀 수정</span>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:7, marginBottom:12 }}>
            {taskTypes.map(type => (
              <div key={type.id} style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ width:10, height:10, borderRadius:"50%", background:type.color, flexShrink:0, opacity:0.7 }} />
                {editingTypeId===type.id
                  ? <input autoFocus value={editingTypeVal} onChange={e=>setEditingTypeVal(e.target.value)} onBlur={()=>saveTypeName(type.id)} onKeyDown={e=>e.key==="Enter"&&saveTypeName(type.id)} style={{ flex:1, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:7, color:C.text, fontSize:12, padding:"3px 9px" }} />
                  : <span onClick={()=>{setEditingTypeId(type.id);setEditingTypeVal(type.label);}} style={{ flex:1, color:C.text, fontSize:13, cursor:"text", borderBottom:`1px dashed ${C.border}`, paddingBottom:1 }}>{type.label}</span>
                }
                <span style={{ color:C.textMuted, fontSize:10 }}>클릭 수정</span>
                <button onClick={()=>removeType(type.id)} onMouseEnter={e=>e.target.style.color="#B07070"} onMouseLeave={e=>e.target.style.color=C.border} style={{ background:"none", border:"none", color:C.border, cursor:"pointer", fontSize:15 }}>×</button>
              </div>
            ))}
          </div>
          <div style={{ display:"flex", gap:7 }}>
            <input value={newTypeName} onChange={e=>setNewTypeName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addType()} placeholder={`새 ${taskTypeTitle} 이름...`} style={{ flex:1, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:9, color:C.text, fontSize:13, padding:"7px 12px" }} />
            <button onClick={addType} style={{ background:C.accent, border:"none", borderRadius:9, color:"#fff", fontWeight:700, fontSize:18, padding:"7px 14px", cursor:"pointer" }}>+</button>
          </div>
        </div>
      )}

      {/* 입력 폼 */}
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:14, padding:"14px 16px", marginBottom:22 }}>
        <div style={{ display:"flex", gap:7, marginBottom:9, flexWrap:"wrap" }}>
          <select value={form.workId} onChange={e=>setForm(f=>({...f,workId:e.target.value}))} style={sel}>{works.map(w=><option key={w.id} value={w.id}>{w.title}</option>)}</select>
          <select value={form.typeId} onChange={e=>setForm(f=>({...f,typeId:e.target.value}))} style={sel}>{taskTypes.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}</select>
          <select value={form.priority} onChange={e=>setForm(f=>({...f,priority:e.target.value}))} style={{ ...sel, color:priorityStyle[form.priority].color, background:priorityStyle[form.priority].bg, border:`1px solid ${priorityStyle[form.priority].border}` }}>
            <option value="긴급">🔴 긴급</option><option value="보통">🟡 보통</option><option value="여유">🟢 여유</option>
          </select>
          <input type="date" value={form.due} onChange={e=>setForm(f=>({...f,due:e.target.value}))} style={{...sel,color:C.textMuted}} />
        </div>
        <div style={{ display:"flex", gap:7, marginBottom:7 }}>
          <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="이름" style={{ width:84, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:9, color:C.text, fontSize:13, padding:"8px 11px" }} />
          <input value={form.task} onChange={e=>setForm(f=>({...f,task:e.target.value}))} placeholder="작업 내용" onKeyDown={e=>e.key==="Enter"&&addTask()} style={{ flex:1, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:9, color:C.text, fontSize:13, padding:"8px 13px" }} />
          <button onClick={addTask} style={{ background:C.accent, border:"none", borderRadius:9, color:"#fff", fontWeight:700, fontSize:18, padding:"8px 16px", cursor:"pointer" }}>+</button>
        </div>
        <input value={form.memo} onChange={e=>setForm(f=>({...f,memo:e.target.value}))} placeholder="메모 (선택)" style={{ width:"100%", background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:9, color:C.text, fontSize:12, padding:"7px 13px" }} />
      </div>

      {/* 업무 목록 */}
      <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
        {active.length===0 && <div style={{ color:C.textMuted, fontSize:13, textAlign:"center", padding:"24px 0" }}>등록된 업무가 없어요</div>}
        {active.map(task => {
          const work = works.find(w=>w.id===task.workId);
          const type = taskTypes.find(t=>t.id===task.typeId);
          const tc = type?.color||C.textMuted;
          const prio = task.priority||"보통";
          const ps = priorityStyle[prio];
          const isEditing = editingTaskId === task.id;
          return (
            <div key={task.id} style={{ background:C.surface, border:`1px solid ${prio==="긴급"?"#DDB8B8":C.border}`, borderRadius:13, overflow:"hidden" }}>
              <div style={{ padding:"12px 15px", display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                <div style={{ width:3, height:36, borderRadius:2, background:ps.color, opacity:0.7, flexShrink:0 }} />
                <span style={{ background:ps.bg, color:ps.color, fontSize:10, padding:"2px 7px", borderRadius:5, border:`1px solid ${ps.border}`, whiteSpace:"nowrap", fontWeight:700 }}>{prio}</span>
                <span style={{ background:`${tc}18`, color:tc, fontSize:10, padding:"2px 7px", borderRadius:5, border:`1px solid ${tc}30`, whiteSpace:"nowrap" }}>{type?.label||"-"}</span>
                <div style={{ width:2.5, height:18, background:work?.color||C.border, borderRadius:2, opacity:0.5 }} />
                <span style={{ color:C.textMid, fontSize:12, fontWeight:700 }}>{task.name}</span>
                {/* 인라인 수정 */}
                <div style={{ flex:1, minWidth:0 }}>
                  {isEditing
                    ? <input autoFocus value={editingTaskVal} onChange={e=>setEditingTaskVal(e.target.value)}
                        onBlur={()=>{ setTasks(p=>p.map(t=>t.id===task.id?{...t,task:editingTaskVal.trim()||t.task}:t)); setEditingTaskId(null); }}
                        onKeyDown={e=>{ if(e.key==="Enter"){ setTasks(p=>p.map(t=>t.id===task.id?{...t,task:editingTaskVal.trim()||t.task}:t)); setEditingTaskId(null); } if(e.key==="Escape") setEditingTaskId(null); }}
                        style={{ width:"100%", background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:7, color:C.text, fontSize:13, padding:"2px 8px" }} />
                    : <span onClick={()=>{setEditingTaskId(task.id);setEditingTaskVal(task.task);}} style={{ color:C.text, fontSize:13, cursor:"text", display:"block", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                        {task.task}
                        {task.memo && <span title={task.memo} style={{ color:C.textMuted, fontSize:11, marginLeft:8, opacity:0.7 }}>— {task.memo.length>20?task.memo.slice(0,20)+"…":task.memo}</span>}
                      </span>
                  }
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
                  {task.due && <span style={{ color:C.textMuted, fontFamily:"monospace", fontSize:11 }}>{task.due}</span>}
                  <select value={task.status} onChange={e=>setStatus(task.id, e.target.value)}
                    style={{ background:`${statusColor[task.status]}18`, border:`1px solid ${statusColor[task.status]}40`, borderRadius:7, color:statusColor[task.status], padding:"3px 7px", fontSize:11, cursor:"pointer" }}>
                    <option value="대기">대기</option><option value="진행중">진행중</option><option value="완료">완료</option>
                  </select>
                  <select value={prio} onChange={e=>setTasks(prev=>prev.map(t=>t.id===task.id?{...t,priority:e.target.value}:t))}
                    style={{ background:ps.bg, border:`1px solid ${ps.border}`, borderRadius:7, color:ps.color, padding:"3px 5px", fontSize:10, cursor:"pointer" }}>
                    <option value="긴급">🔴</option><option value="보통">🟡</option><option value="여유">🟢</option>
                  </select>
                  <button onClick={()=>setTasks(prev=>prev.filter(t=>t.id!==task.id))} onMouseEnter={e=>e.target.style.color="#B07070"} onMouseLeave={e=>e.target.style.color=C.border} style={{ background:"none", border:"none", color:C.border, cursor:"pointer", fontSize:16 }}>×</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── ArchiveTab ───────────────────────────────────────
function ArchiveTab({ works, onUpdateWork, todos, setTodos, tasks, setTasks, taskTypes, planCategories }) {
  const C = getC();
  const [filter, setFilter] = useState("all");
  const doneTodos = todos.filter(t => t.done);
  const doneTasks = tasks.filter(t => t.status==="완료");
  const doneEpisodes = useMemo(() => {
    const eps = [];
    works.forEach(w => {
      (w.episodes||[]).filter(e => e.doneAt).forEach(ep => {
        eps.push({...ep, workTitle:w.title, workColor:w.color, workId:w.id});
      });
    });
    return eps.sort((a,b) => (b.doneAt||"").localeCompare(a.doneAt||""));
  }, [works]);

  const restoreTodo = id => setTodos(p => p.map(t => t.id===id ? {...t, done:false, doneAt:undefined} : t));
  const restoreTask = id => setTasks(p => p.map(t => t.id===id ? {...t, status:"대기", doneAt:undefined} : t));
  const restoreEpisode = (workId, epId) => {
    const w = works.find(wk => wk.id === workId);
    if (!w) return;
    const updated = {...w, episodes: w.episodes.map(ep => ep.id===epId ? {...ep, doneAt:null} : ep)};
    onUpdateWork(updated);
  };

  const grouped = useMemo(() => {
    const all = [
      ...doneTodos.map(t => { const cat=planCategories.find(c=>c.id===t.catId); return { id:"td_"+t.id, rawId:t.id, type:"plan", text:t.text, work:works.find(w=>w.id===t.workId)?.title||"-", date:t.doneAt||t.createdAt||"", color:works.find(w=>w.id===t.workId)?.color||C.textMuted, catLabel:cat?.label, catColor:cat?.color }; }),
      ...doneTasks.map(t => { const tp=taskTypes.find(x=>x.id===t.typeId); return { id:"tk_"+t.id, rawId:t.id, type:"task", text:`${t.name} — ${t.task}`, work:works.find(w=>w.id===t.workId)?.title||"-", date:t.doneAt||t.createdAt||"", color:tp?.color||C.textMuted, typeLabel:tp?.label||"-" }; }),
    ].sort((a,b) => b.date.localeCompare(a.date));
    const byDate = {};
    all.forEach(item => { const day=item.date?item.date.slice(0,10):"날짜 없음"; if(!byDate[day]) byDate[day]=[]; byDate[day].push(item); });
    return byDate;
  }, [doneTodos, doneTasks, works, taskTypes, planCategories]);

  const filtered = Object.fromEntries(Object.entries(grouped).map(([d,items])=>[d,items.filter(i=>filter==="all"||i.type===filter)]).filter(([,items])=>items.length>0));
  const total = doneTodos.length + doneTasks.length + doneEpisodes.length;

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:18 }}>
        <div style={{ color:C.text, fontWeight:700, fontSize:17 }}>완료 아카이브</div>
        <span style={{ color:C.textMuted, fontSize:12 }}>총 {total}건</span>
        <div style={{ marginLeft:"auto", display:"flex", gap:5 }}>
          {[["all","전체"],["plan","플랜"],["task","업무"],["episode","화"]].map(([v,l]) => (
            <button key={v} onClick={()=>setFilter(v)} style={{ background:filter===v?C.accent:"transparent", border:`1px solid ${filter===v?C.accent:C.border}`, borderRadius:7, color:filter===v?"#fff":C.textMid, fontSize:12, padding:"4px 11px", cursor:"pointer", transition:"all 0.15s" }}>{l}</button>
          ))}
        </div>
      </div>
      {total===0 && <div style={{ color:C.textMuted, fontSize:13, textAlign:"center", padding:"40px 0" }}>완료된 항목이 없어요</div>}

      {/* 완료된 에피소드 */}
      {(filter==="all" || filter==="episode") && doneEpisodes.length > 0 && (
        <div style={{ marginBottom:24 }}>
          <div style={{ color:C.textMuted, fontSize:11, fontWeight:700, marginBottom:9, paddingBottom:6, borderBottom:`1px solid ${C.borderLight}` }}>완료 화 ({doneEpisodes.length})</div>
          <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
            {doneEpisodes.map(ep => (
              <div key={ep.id} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:11, padding:"10px 16px", display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ width:8, height:8, borderRadius:"50%", background:ep.workColor, flexShrink:0 }} />
                <span style={{ color:ep.workColor, fontWeight:700, fontSize:12 }}>{ep.workTitle}</span>
                <span style={{ color:C.text, fontSize:13, fontWeight:600 }}>{ep.label}</span>
                <span style={{ marginLeft:"auto", color:C.textMuted, fontSize:11, fontFamily:"monospace" }}>{ep.doneAt?ep.doneAt.slice(0,10):"-"}</span>
              </div>
            ))}
          </div>
        </div>
      )}
      {Object.entries(filtered).map(([date,items]) => (
        <div key={date} style={{ marginBottom:20 }}>
          <div style={{ color:C.textMuted, fontSize:11, fontWeight:700, marginBottom:9, paddingBottom:6, borderBottom:`1px solid ${C.borderLight}` }}>{date}</div>
          <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
            {items.map(item => (
              <div key={item.id} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:11, padding:"10px 14px", display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:8, height:8, borderRadius:"50%", background:item.color, opacity:0.7, flexShrink:0 }} />
                <div style={{ flex:1 }}>
                  <div style={{ color:C.text, fontSize:13 }}>{item.text}</div>
                  <div style={{ color:C.textMuted, fontSize:10, marginTop:2 }}>
                    {item.work}
                    {item.catLabel && <span style={{ marginLeft:6, color:item.catColor, fontSize:10 }}>{item.catLabel}</span>}
                    {item.typeLabel && <span style={{ marginLeft:6, color:item.color, fontSize:10 }}>{item.typeLabel}</span>}
                  </div>
                </div>
                <span style={{ background:item.type==="plan"?"#6E9EAD18":"#9E7BB518", color:item.type==="plan"?"#6E9EAD":"#9E7BB5", fontSize:10, padding:"2px 7px", borderRadius:5, border:`1px solid ${item.type==="plan"?"#6E9EAD30":"#9E7BB530"}` }}>{item.type==="plan"?"플랜":"업무"}</span>
                <button onClick={()=>item.type==="plan"?restoreTodo(item.rawId):restoreTask(item.rawId)}
                  onMouseEnter={e=>e.currentTarget.style.background=C.surfaceAlt}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                  style={{ background:"transparent", border:`1px solid ${C.border}`, borderRadius:7, color:C.textMuted, fontSize:11, padding:"3px 10px", cursor:"pointer", flexShrink:0 }}>↩ 되돌리기</button>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── ResearchTab ──────────────────────────────────────
const RESEARCH_STATUSES = ["미완료","진행중","완료"];
const DEFAULT_RES_CATS = [
  { id:"rc_book", label:"책", color:"#7B89BE" },
  { id:"rc_video", label:"영상", color:"#C49A6C" },
  { id:"rc_web", label:"웹사이트", color:"#6E9EAD" },
  { id:"rc_etc", label:"기타", color:"#A89070" },
];

function ResearchTab({ works, researches, setResearches, resCats, setResCats }) {
  const C = getC();
  const [workTab, setWorkTab] = useState("common");
  const [statusFilter, setStatusFilter] = useState("all");
  const [catFilter, setCatFilter] = useState("all");
  const [form, setForm] = useState({ title:"", content:"", url:"", memo:"", deadline:"", catId:resCats[0]?.id||"", status:"미완료" });
  const [showCatMgr, setShowCatMgr] = useState(false);
  const [newCatName, setNewCatName] = useState("");
  const [editingCatId, setEditingCatId] = useState(null);
  const [editingCatVal, setEditingCatVal] = useState("");
  const [editingId, setEditingId] = useState(null);
  const [editingVal, setEditingVal] = useState("");

  const sel = { background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:8, color:C.textMid, padding:"6px 10px", fontSize:12, cursor:"pointer" };
  const statusColor = { "미완료":C.textMuted, "진행중":"#6E9EAD", "완료":"#7A9E7E" };
  const statusBg    = { "미완료":C.surfaceAlt, "진행중":"#6E9EAD18", "완료":"#7A9E7E18" };

  const addRes = () => {
    if (!form.title.trim()) return;
    const workId = workTab==="common" ? "common" : workTab;
    setResearches(prev => [...prev, { ...form, id:Date.now(), workId, createdAt:new Date().toISOString(), doneAt:undefined }]);
    setForm(f => ({...f, title:"", content:"", url:"", memo:"", deadline:""}));
  };
  const setStatus = (id, status) => setResearches(p => p.map(r => r.id===id ? {...r, status, doneAt:status==="완료"?new Date().toISOString():r.doneAt} : r));
  const addCat = () => {
    if (!newCatName.trim()) return;
    setResCats(prev => [...prev, { id:"rc_"+Date.now(), label:newCatName.trim(), color:PRESET_COLORS[prev.length%PRESET_COLORS.length] }]);
    setNewCatName("");
  };
  const removeCat = id => { setResCats(p=>p.filter(c=>c.id!==id)); setResearches(p=>p.map(r=>r.catId===id?{...r,catId:""}:r)); };
  const saveCat = id => { if(editingCatVal.trim()) setResCats(p=>p.map(c=>c.id===id?{...c,label:editingCatVal.trim()}:c)); setEditingCatId(null); };

  const allTabs = [{ id:"all", label:"전체" }, { id:"common", label:"공통" }, ...works.map(w=>({ id:String(w.id), label:w.title, color:w.color }))];
  const list = researches.filter(r => {
    const wMatch = workTab==="all" ? true : workTab==="common" ? r.workId==="common" : r.workId===workTab;
    const sMatch = statusFilter==="all" || r.status===statusFilter;
    const cMatch = catFilter==="all" || r.catId===catFilter;
    return wMatch && sMatch && cMatch && r.status!=="완료";
  });
  const doneList = researches.filter(r => {
    const wMatch = workTab==="all" ? true : workTab==="common" ? r.workId==="common" : r.workId===workTab;
    return wMatch && r.status==="완료";
  });

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", marginBottom:16 }}>
        <div style={{ color:C.text, fontWeight:700, fontSize:17 }}>자료조사</div>
        <button onClick={()=>setShowCatMgr(!showCatMgr)}
          onMouseEnter={e=>e.currentTarget.style.background=C.borderLight}
          onMouseLeave={e=>e.currentTarget.style.background=C.surfaceAlt}
          style={{ marginLeft:"auto", background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:8, color:C.textMuted, fontSize:11, padding:"4px 11px", cursor:"pointer" }}>
          {showCatMgr?"▲ 닫기":"⚙ 카테고리"}
        </button>
      </div>

      {/* 카테고리 관리 */}
      {showCatMgr && (
        <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:14, padding:"14px 16px", marginBottom:16 }}>
          <div style={{ color:C.textMid, fontSize:12, fontWeight:700, marginBottom:10 }}>카테고리</div>
          <div style={{ display:"flex", flexDirection:"column", gap:7, marginBottom:10 }}>
            {resCats.map(cat => (
              <div key={cat.id} style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ width:10, height:10, borderRadius:"50%", background:cat.color, flexShrink:0 }} />
                {editingCatId===cat.id
                  ? <input autoFocus value={editingCatVal} onChange={e=>setEditingCatVal(e.target.value)} onBlur={()=>saveCat(cat.id)} onKeyDown={e=>e.key==="Enter"&&saveCat(cat.id)} style={{ flex:1, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:7, color:C.text, fontSize:12, padding:"3px 9px" }} />
                  : <span onClick={()=>{setEditingCatId(cat.id);setEditingCatVal(cat.label);}} style={{ flex:1, color:C.text, fontSize:13, cursor:"text", borderBottom:`1px dashed ${C.border}`, paddingBottom:1 }}>{cat.label}</span>
                }
                <span style={{ color:C.textMuted, fontSize:10 }}>클릭 수정</span>
                <button onClick={()=>removeCat(cat.id)} onMouseEnter={e=>e.target.style.color="#B07070"} onMouseLeave={e=>e.target.style.color=C.border} style={{ background:"none", border:"none", color:C.border, cursor:"pointer", fontSize:15 }}>×</button>
              </div>
            ))}
          </div>
          <div style={{ display:"flex", gap:7 }}>
            <input value={newCatName} onChange={e=>setNewCatName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCat()} placeholder="새 카테고리..." style={{ flex:1, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:9, color:C.text, fontSize:13, padding:"7px 12px" }} />
            <button onClick={addCat} style={{ background:C.accent, border:"none", borderRadius:9, color:"#fff", fontWeight:700, fontSize:18, padding:"7px 14px", cursor:"pointer" }}>+</button>
          </div>
        </div>
      )}

      {/* 작품 탭 */}
      <div style={{ display:"flex", gap:4, marginBottom:16, flexWrap:"wrap" }}>
        {allTabs.map(t => (
          <button key={t.id} onClick={()=>setWorkTab(t.id)}
            style={{ background:workTab===t.id?(t.color||C.accent)+"22":"transparent", border:`1px solid ${workTab===t.id?(t.color||C.accent)+"88":C.border}`, borderRadius:8, color:workTab===t.id?(t.color||C.accent):C.textMid, fontWeight:workTab===t.id?700:400, fontSize:12, padding:"4px 12px", cursor:"pointer", transition:"all 0.15s" }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* 필터 */}
      <div style={{ display:"flex", gap:6, marginBottom:16, flexWrap:"wrap" }}>
        {[["all","전체상태"],...RESEARCH_STATUSES.filter(s=>s!=="완료").map(s=>[s,s])].map(([v,l]) => (
          <button key={v} onClick={()=>setStatusFilter(v)} style={{ background:statusFilter===v?C.accent:"transparent", border:`1px solid ${statusFilter===v?C.accent:C.border}`, borderRadius:7, color:statusFilter===v?"#fff":C.textMid, fontSize:11, padding:"3px 10px", cursor:"pointer" }}>{l}</button>
        ))}
        <div style={{ width:1, background:C.border, margin:"0 2px" }} />
        {[["all","전체카테고리"],...resCats.map(c=>[c.id,c.label])].map(([v,l]) => (
          <button key={v} onClick={()=>setCatFilter(v)} style={{ background:catFilter===v?C.accent:"transparent", border:`1px solid ${catFilter===v?C.accent:C.border}`, borderRadius:7, color:catFilter===v?"#fff":C.textMid, fontSize:11, padding:"3px 10px", cursor:"pointer" }}>{l}</button>
        ))}
      </div>

      {/* 입력 폼 */}
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:14, padding:"14px 16px", marginBottom:22 }}>
        <div style={{ display:"flex", gap:7, marginBottom:9, flexWrap:"wrap" }}>
          <select value={form.catId} onChange={e=>setForm(f=>({...f,catId:e.target.value}))} style={sel}>
            {resCats.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
          </select>
          <select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={{...sel, color:statusColor[form.status]}}>
            {RESEARCH_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        <div style={{ display:"flex", gap:7, marginBottom:7 }}>
          <input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addRes()} placeholder="제목 *"
            style={{ flex:1, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:9, color:C.text, fontSize:13, padding:"8px 13px" }} />
          <button onClick={addRes} style={{ background:C.accent, border:"none", borderRadius:9, color:"#fff", fontWeight:700, fontSize:18, padding:"8px 16px", cursor:"pointer" }}>+</button>
        </div>
        <input value={form.content} onChange={e=>setForm(f=>({...f,content:e.target.value}))} placeholder="내용 (선택)"
          style={{ width:"100%", background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:9, color:C.text, fontSize:12, padding:"7px 12px", marginBottom:7 }} />
        <div style={{ display:"flex", gap:7, marginBottom:7 }}>
          <input value={form.url} onChange={e=>setForm(f=>({...f,url:e.target.value}))} placeholder="URL (선택)"
            style={{ flex:1, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:9, color:C.text, fontSize:12, padding:"7px 12px" }} />
          <input value={form.memo} onChange={e=>setForm(f=>({...f,memo:e.target.value}))} placeholder="메모 (선택)"
            style={{ flex:1, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:9, color:C.text, fontSize:12, padding:"7px 12px" }} />
        </div>
        <div style={{ display:"flex", gap:7 }}>
          <input type="date" value={form.deadline} onChange={e=>setForm(f=>({...f,deadline:e.target.value}))} placeholder="마감일 (선택)"

        {list.map(r => {
          const cat = resCats.find(c=>c.id===r.catId);
          const isEditing = editingId===r.id;
          return (
            <div key={r.id} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:13, padding:"12px 15px" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                {cat && <span style={{ background:`${cat.color}18`, color:cat.color, fontSize:10, padding:"2px 8px", borderRadius:5, border:`1px solid ${cat.color}30`, flexShrink:0 }}>{cat.label}</span>}
                {workTab==="all" && (() => {
                  const w = r.workId==="common" ? null : works.find(x=>String(x.id)===r.workId);
                  return <span style={{ background:w?`${w.color}18`:C.surfaceAlt, color:w?w.color:C.textMuted, fontSize:10, padding:"2px 8px", borderRadius:5, border:`1px solid ${w?w.color+"30":C.border}`, flexShrink:0 }}>{w?w.title:"공통"}</span>;
                })()}
                {/* 제목 인라인 수정 */}
                <div style={{ flex:1, minWidth:0 }}>
                  {isEditing
                    ? <input autoFocus value={editingVal} onChange={e=>setEditingVal(e.target.value)}
                        onBlur={()=>{ setResearches(p=>p.map(x=>x.id===r.id?{...x,title:editingVal.trim()||x.title}:x)); setEditingId(null); }}
                        onKeyDown={e=>{ if(e.key==="Enter"){ setResearches(p=>p.map(x=>x.id===r.id?{...x,title:editingVal.trim()||x.title}:x)); setEditingId(null); } if(e.key==="Escape") setEditingId(null); }}
                        style={{ width:"100%", background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:7, color:C.text, fontSize:13, padding:"2px 8px" }} />
                    : <span onClick={()=>{setEditingId(r.id);setEditingVal(r.title);}} style={{ color:C.text, fontSize:13, fontWeight:700, cursor:"text" }}>
                        {r.title}
                        {r.memo && <span title={r.memo} style={{ color:C.textMuted, fontSize:11, marginLeft:8, fontWeight:400 }}>— {r.memo.length>20?r.memo.slice(0,20)+"…":r.memo}</span>}
                      </span>
                  }
                </div>
                {r.url && <a href={r.url} target="_blank" rel="noopener noreferrer" style={{ color:C.accent, fontSize:11, textDecoration:"none", border:`1px solid ${C.border}`, borderRadius:6, padding:"2px 8px", flexShrink:0 }}>🔗 열기</a>}
                {r.deadline && (() => {
                  const dd = getDday(r.deadline);
                  return <span style={{ background:dd.urgent?"#F5E8E8":C.surfaceAlt, color:dd.urgent?"#B07070":C.textMuted, border:`1px solid ${dd.urgent?"#DDB8B8":C.border}`, borderRadius:6, padding:"2px 8px", fontSize:10, fontWeight:700, fontFamily:"monospace", flexShrink:0 }}>{dd.label}</span>;
                })()}
                <select value={r.status} onChange={e=>setStatus(r.id, e.target.value)}
                  style={{ background:statusBg[r.status], border:`1px solid ${statusColor[r.status]}40`, borderRadius:7, color:statusColor[r.status], padding:"3px 7px", fontSize:11, cursor:"pointer", flexShrink:0 }}>
                  {RESEARCH_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
                <button onClick={()=>setResearches(p=>p.filter(x=>x.id!==r.id))} onMouseEnter={e=>e.target.style.color="#B07070"} onMouseLeave={e=>e.target.style.color=C.border} style={{ background:"none", border:"none", color:C.border, cursor:"pointer", fontSize:16, flexShrink:0 }}>×</button>
              </div>
              {r.content && <div style={{ color:C.textMid, fontSize:12, marginTop:7, paddingTop:7, borderTop:`1px solid ${C.borderLight}`, lineHeight:1.6 }}>{r.content}</div>}
            </div>
          );
        })}
      </div>

      {/* 완료된 자료 */}
      {doneList.length > 0 && (
        <div>
          <div style={{ color:C.textMuted, fontSize:11, fontWeight:700, marginBottom:10, paddingBottom:6, borderBottom:`1px solid ${C.borderLight}` }}>완료 ({doneList.length})</div>
          {doneList.map(r => {
            const cat = resCats.find(c=>c.id===r.catId);
            return (
              <div key={r.id} style={{ background:C.surfaceAlt, border:`1px solid ${C.borderLight}`, borderRadius:11, padding:"10px 14px", display:"flex", alignItems:"center", gap:8, marginBottom:7, opacity:0.6 }}>
                {cat && <span style={{ color:cat.color, fontSize:10 }}>{cat.label}</span>}
                {workTab==="all" && (() => {
                  const w = r.workId==="common" ? null : works.find(x=>String(x.id)===r.workId);
                  return <span style={{ color:w?w.color:C.textMuted, fontSize:10 }}>{w?w.title:"공통"}</span>;
                })()}
                <span style={{ color:C.textMid, fontSize:13, flex:1, textDecoration:"line-through" }}>{r.title}</span>
                {r.url && <a href={r.url} target="_blank" rel="noopener noreferrer" style={{ color:C.accent, fontSize:11, textDecoration:"none" }}>🔗</a>}
                <button onClick={()=>setResearches(p=>p.map(x=>x.id===r.id?{...x,status:"미완료",doneAt:undefined}:x))}
                  style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:6, color:C.textMuted, fontSize:10, padding:"2px 8px", cursor:"pointer" }}>↩ 되돌리기</button>
                <button onClick={()=>setResearches(p=>p.filter(x=>x.id!==r.id))} onMouseEnter={e=>e.target.style.color="#B07070"} onMouseLeave={e=>e.target.style.color=C.border} style={{ background:"none", border:"none", color:C.border, cursor:"pointer", fontSize:15 }}>×</button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── MonthlyAlertBanner ───────────────────────────────
function MonthlyAlertBanner({ works, assistantSettings, monthlyChecklist, setMonthlyChecklist }) {
  const C = getC();
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const day = today.getDate();
  const monthKey = `${year}-${String(month+1).padStart(2,'0')}`;
  const lastDay = new Date(year, month+1, 0).getDate();
  const checklist = monthlyChecklist[monthKey] || {};

  const updateChecklist = (key, value) => {
    setMonthlyChecklist(prev => ({ ...prev, [monthKey]: { ...(prev[monthKey]||{}), [key]: value } }));
  };

  const names = assistantSettings.names || ['어시스턴트 A', '어시스턴트 B'];
  const rate = assistantSettings.ratePerEpisode || 250000;
  const count = (assistantSettings.names||['A','B']).length;

  const currentMonthEps = useMemo(() => {
    const eps = [];
    works.forEach(w => {
      (w.episodes || []).forEach(ep => {
        if (ep.deadline && ep.deadline.slice(0,7) === monthKey) eps.push({ ...ep, workTitle: w.title });
      });
    });
    return eps.sort((a,b) => a.deadline.localeCompare(b.deadline));
  }, [works, monthKey]);

  const totalCost = currentMonthEps.length * rate * count;
  const psdLabel = currentMonthEps.length > 0
    ? `${currentMonthEps[0].label} ~ ${currentMonthEps[currentMonthEps.length-1].label}`
    : `${currentMonthEps.length}화`;

  // PSD 마감: 다음달 15일 기준
  const nextMonth15 = new Date(year, month+1, 15);
  const daysUntilPSD = Math.round((nextMonth15 - today) / 86400000);
  const showPSD = daysUntilPSD >= 0 && daysUntilPSD <= 3;
  const psdLabel15 = daysUntilPSD === 0 ? 'D-DAY' : `D-${daysUntilPSD}`;

  // 사업소득지급대장(세무사): 당월 15일 기준
  const daysUntil15 = 15 - day;
  const show15Accountant = day <= 15 && daysUntil15 <= 3;
  const d15Label = daysUntil15 === 0 ? 'D-DAY' : `D-${daysUntil15}`;

  const daysUntilEnd = lastDay - day;
  const showEnd = daysUntilEnd >= 0 && daysUntilEnd <= 3;
  const dEndLabel = daysUntilEnd === 0 ? 'D-DAY' : `D-${daysUntilEnd}`;
  const allAssistantsPaid = names.every((_, i) => checklist[`assistant${i}Paid`]);
  const allDone15 = checklist.accountantSent && checklist.psdSubmitted;

  if ((!showPSD || allDone15) && (!showEnd || allAssistantsPaid) && (!show15Accountant || checklist.accountantSent)) return null;

  return (
    <div style={{ background:'#F4F8FF', borderBottom:'1px solid #C8D8F0', padding:'10px 28px' }}>
      <div style={{ display:'flex', gap:10, flexWrap:'wrap', alignItems:'flex-start' }}>
        {showEnd && !allAssistantsPaid && (
          <div style={{ display:'flex', flexDirection:'column', gap:6, background:'#FFFAF0', border:'1px solid #E8D0A0', borderRadius:12, padding:'10px 16px' }}>
            <span style={{ color:'#A07030', fontWeight:700, fontSize:12 }}>💰 어시스턴트 비용 지급 {dEndLabel}</span>
            <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
              {names.map((name, i) => (
                <label key={i} style={{ display:'inline-flex', alignItems:'center', gap:5, cursor:'pointer', background:checklist[`assistant${i}Paid`]?'#EFF8EF':'transparent', borderRadius:7, padding:'3px 8px', border:`1px solid ${checklist[`assistant${i}Paid`]?'#B0D8B0':'#E8D0A0'}` }}>
                  <input type='checkbox' checked={!!checklist[`assistant${i}Paid`]} onChange={e=>updateChecklist(`assistant${i}Paid`, e.target.checked)} style={{ cursor:'pointer', accentColor:'#7A9E7E' }} />
                  <span style={{ color:checklist[`assistant${i}Paid`]?'#5A8A5A':'#A07030', fontSize:12 }}>{name} — {rate.toLocaleString()}원</span>
                </label>
              ))}
            </div>
          </div>
        )}
        {showPSD && !checklist.psdSubmitted && (
          <div style={{ display:'flex', flexDirection:'column', gap:6, background:'#F0FFF5', border:'1px solid #A8D8B8', borderRadius:12, padding:'10px 16px' }}>
            <span style={{ color:'#407050', fontWeight:700, fontSize:12 }}>🗂 PSD 파일 마감 {psdLabel15}</span>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <span style={{ color:'#407050', fontSize:12 }}>{psdLabel} ({currentMonthEps.length}화)</span>
              <label style={{ display:'inline-flex', alignItems:'center', gap:5, cursor:'pointer', background:checklist.psdSubmitted?'#EFF8EF':'transparent', borderRadius:7, padding:'3px 8px', border:`1px solid ${checklist.psdSubmitted?'#B0D8B0':'#A8D8B8'}` }}>
                <input type='checkbox' checked={!!checklist.psdSubmitted} onChange={e=>updateChecklist('psdSubmitted', e.target.checked)} style={{ cursor:'pointer', accentColor:'#7A9E7E' }} />
                <span style={{ color:'#407050', fontSize:12 }}>제출 완료</span>
              </label>
            </div>
          </div>
        )}
        {show15Accountant && !checklist.accountantSent && (
          <div style={{ display:'flex', flexDirection:'column', gap:6, background:'#F8F0FF', border:'1px solid #C8A8E8', borderRadius:12, padding:'10px 16px' }}>
            <span style={{ color:'#604880', fontWeight:700, fontSize:12 }}>📋 사업소득지급대장 세무사 발송 {d15Label}</span>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <span style={{ color:'#604880', fontSize:12 }}>이번 달 총 지급액: {totalCost.toLocaleString()}원</span>
              <label style={{ display:'inline-flex', alignItems:'center', gap:5, cursor:'pointer', background:checklist.accountantSent?'#EFF8EF':'transparent', borderRadius:7, padding:'3px 8px', border:`1px solid ${checklist.accountantSent?'#B0D8B0':'#C8A8E8'}` }}>
                <input type='checkbox' checked={!!checklist.accountantSent} onChange={e=>updateChecklist('accountantSent', e.target.checked)} style={{ cursor:'pointer', accentColor:'#7A9E7E' }} />
                <span style={{ color:'#604880', fontSize:12 }}>발송 완료</span>
              </label>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── CostManagementTab ────────────────────────────────
function CostManagementTab({ works, assistantSettings, setAssistantSettings, monthlyChecklist, setMonthlyChecklist }) {
  const C = getC();
  const today = new Date();
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth() + 1);
  const [editingSettings, setEditingSettings] = useState(false);
  const [settingsForm, setSettingsForm] = useState({ ...assistantSettings });

  const monthKey = `${viewYear}-${String(viewMonth).padStart(2,'0')}`;
  const currentMonthKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const checklist = monthlyChecklist[monthKey] || {};
  const names = assistantSettings.names || ['어시스턴트 A', '어시스턴트 B'];
  const rate = assistantSettings.ratePerEpisode || 250000;
  const count = names.length;

  const updateChecklist = (key, value) => {
    setMonthlyChecklist(prev => ({ ...prev, [monthKey]: { ...(prev[monthKey]||{}), [key]: value } }));
  };

  const monthEps = useMemo(() => {
    const eps = [];
    works.forEach(w => {
      (w.episodes || []).forEach(ep => {
        if (!ep.deadline) return;
        // 공개일 = 마감일 + 1일
        const dlDate = new Date(ep.deadline);
        dlDate.setDate(dlDate.getDate() + 1);
        const publishDate = dlDate.toISOString().slice(0,10);
        if (publishDate.slice(0,7) === monthKey) {
          eps.push({ ...ep, workTitle: w.title, workColor: w.color, publishDate });
        }
      });
    });
    return eps.sort((a,b) => a.publishDate.localeCompare(b.publishDate));
  }, [works, monthKey]);

  const totalEps = monthEps.length;
  const perAssistant = totalEps * rate;
  const totalCost = perAssistant * count;
  const lastDayOfViewMonth = new Date(viewYear, viewMonth, 0).getDate();

  const history = useMemo(() => {
    const months = [];
    for (let i = 11; i >= 0; i--) {
      const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      const eps = [];
      works.forEach(w => { (w.episodes||[]).forEach(ep => {
        if (!ep.deadline) return;
        const dlDate = new Date(ep.deadline); dlDate.setDate(dlDate.getDate()+1);
        if (dlDate.toISOString().slice(0,7) === key) eps.push(ep);
      }); });
      months.push({ key, label:`${d.getFullYear()}년 ${d.getMonth()+1}월`, epCount:eps.length, total:eps.length*rate*count, checklist:monthlyChecklist[key]||{} });
    }
    return months;
  }, [works, rate, count, monthlyChecklist]);

  const prevMonth = () => { if(viewMonth===1){setViewMonth(12);setViewYear(y=>y-1);}else setViewMonth(m=>m-1); };
  const nextMonth = () => { if(viewMonth===12){setViewMonth(1);setViewYear(y=>y+1);}else setViewMonth(m=>m+1); };
  const saveSettings = () => { setAssistantSettings({ ...settingsForm, count:(settingsForm.names||[]).length }); setEditingSettings(false); };

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20, flexWrap:'wrap' }}>
        <div style={{ color:C.text, fontWeight:700, fontSize:17 }}>💰 비용 관리</div>
        <button onClick={()=>{ setSettingsForm({...assistantSettings}); setEditingSettings(!editingSettings); }}
          onMouseEnter={e=>e.currentTarget.style.background=C.surfaceAlt} onMouseLeave={e=>e.currentTarget.style.background='transparent'}
          style={{ background:'transparent', border:`1px solid ${C.border}`, borderRadius:8, color:C.textMuted, fontSize:11, padding:'4px 11px', cursor:'pointer' }}>
          {editingSettings?'▲ 설정 닫기':'⚙ 어시스턴트 설정'}
        </button>
        <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:8 }}>
          <button onClick={prevMonth} style={{ background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:7, color:C.textMid, fontSize:13, padding:'4px 10px', cursor:'pointer' }}>‹</button>
          <span style={{ color:C.text, fontWeight:700, fontSize:14, minWidth:100, textAlign:'center' }}>{viewYear}년 {viewMonth}월</span>
          <button onClick={nextMonth} style={{ background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:7, color:C.textMid, fontSize:13, padding:'4px 10px', cursor:'pointer' }}>›</button>
        </div>
      </div>

      {editingSettings && (
        <div style={{ background:C.surface, border:`1px solid ${C.accent}40`, borderRadius:14, padding:'16px 18px', marginBottom:20 }}>
          <div style={{ color:C.text, fontWeight:700, fontSize:14, marginBottom:14 }}>어시스턴트 설정</div>
          <div style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:14 }}>
            {(settingsForm.names||['어시스턴트 A','어시스턴트 B']).map((name, i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:10 }}>
                <span style={{ color:C.textMuted, fontSize:12, minWidth:90 }}>이름 {i+1}</span>
                <input value={name} onChange={e=>{ const ns=[...(settingsForm.names||['어시스턴트 A','어시스턴트 B'])]; ns[i]=e.target.value; setSettingsForm(f=>({...f,names:ns})); }}
                  style={{ flex:1, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, fontSize:13, padding:'6px 10px' }} />
              </div>
            ))}
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <span style={{ color:C.textMuted, fontSize:12, minWidth:90 }}>화당 단가</span>
              <input type='number' value={settingsForm.ratePerEpisode||250000} onChange={e=>setSettingsForm(f=>({...f,ratePerEpisode:Number(e.target.value)}))}
                style={{ flex:1, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, fontSize:13, padding:'6px 10px' }} />
              <span style={{ color:C.textMuted, fontSize:12 }}>원 / 화 / 인</span>
            </div>
          </div>
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={saveSettings} style={{ background:C.accent, border:'none', borderRadius:8, color:'#fff', fontWeight:700, fontSize:13, padding:'7px 18px', cursor:'pointer' }}>저장</button>
            <button onClick={()=>setEditingSettings(false)} style={{ background:'transparent', border:`1px solid ${C.border}`, borderRadius:8, color:C.textMuted, fontSize:13, padding:'7px 14px', cursor:'pointer' }}>취소</button>
          </div>
        </div>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12, marginBottom:20 }}>
        <div style={{ background:C.surface, border:`1.5px solid ${C.accent}50`, borderRadius:14, padding:'18px 20px' }}>
          <div style={{ color:C.textMuted, fontSize:11, marginBottom:6 }}>{viewYear}년 {viewMonth}월 총 지출</div>
          <div style={{ color:C.accent, fontWeight:900, fontSize:22, fontFamily:'monospace' }}>{totalCost.toLocaleString()}원</div>
          <div style={{ color:C.textMuted, fontSize:11, marginTop:5 }}>{totalEps}화 × {rate.toLocaleString()}원 × {count}명</div>
          <div style={{ marginTop:10, padding:'7px 10px', background:C.surfaceAlt, borderRadius:8 }}>
            <span style={{ color:C.textMuted, fontSize:11 }}>지급일: </span>
            <span style={{ color:C.text, fontWeight:700, fontSize:12, fontFamily:'monospace' }}>{viewYear}.{String(viewMonth).padStart(2,'0')}.{String(lastDayOfViewMonth).padStart(2,'0')} (말일)</span>
          </div>
        </div>
        {names.map((name, i) => (
          <div key={i} style={{ background:C.surface, border:`1px solid ${checklist[`assistant${i}Paid`]?'#7A9E7E':C.border}`, borderRadius:14, padding:'18px 20px', position:'relative' }}>
            {checklist[`assistant${i}Paid`] && <span style={{ position:'absolute', top:12, right:12, background:'#7A9E7E20', color:'#5A8A5A', border:'1px solid #A0C8A0', borderRadius:6, fontSize:10, padding:'2px 8px', fontWeight:700 }}>✓ 지급완료</span>}
            <div style={{ color:C.textMuted, fontSize:11, marginBottom:6 }}>{name}</div>
            <div style={{ color:C.text, fontWeight:700, fontSize:20, fontFamily:'monospace' }}>{perAssistant.toLocaleString()}원</div>
            <div style={{ color:C.textMuted, fontSize:11, marginTop:5 }}>{totalEps}화 × {rate.toLocaleString()}원</div>
            <div style={{ marginTop:12 }}>
              <label style={{ display:'flex', alignItems:'center', gap:7, cursor:'pointer', padding:'6px 10px', background:checklist[`assistant${i}Paid`]?'#EFF8EF':C.surfaceAlt, borderRadius:8, border:`1px solid ${checklist[`assistant${i}Paid`]?'#A0C8A0':C.border}`, transition:'all 0.2s' }}>
                <input type='checkbox' checked={!!checklist[`assistant${i}Paid`]} onChange={e=>updateChecklist(`assistant${i}Paid`, e.target.checked)} style={{ width:15, height:15, cursor:'pointer', accentColor:'#7A9E7E' }} />
                <span style={{ color:checklist[`assistant${i}Paid`]?'#5A8A5A':C.textMid, fontSize:12, fontWeight:700 }}>지급 완료 처리</span>
              </label>
            </div>
          </div>
        ))}
      </div>

      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:14, padding:'16px 18px', marginBottom:20 }}>
        <div style={{ color:C.text, fontWeight:700, fontSize:14, marginBottom:12 }}>
          {viewYear}년 {viewMonth}월 공개 화 목록
          <span style={{ color:C.textMuted, fontWeight:400, fontSize:12, marginLeft:8 }}>({totalEps}화 · 화당 {(rate*count).toLocaleString()}원)</span>
        </div>
        {monthEps.length === 0
          ? <div style={{ color:C.textMuted, fontSize:13, textAlign:'center', padding:'24px 0' }}>이번 달 등록된 에피소드가 없어요<br/><span style={{ fontSize:11 }}>에피소드 공개일(마감일+1일) 기준으로 자동 반영됩니다</span></div>
          : <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
              {monthEps.map((ep, i) => (
                <div key={i} style={{ background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:10, padding:'8px 13px', minWidth:120 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}>
                    <div style={{ width:9, height:9, borderRadius:'50%', background:ep.workColor, flexShrink:0 }} />
                    <span style={{ color:C.text, fontSize:13, fontWeight:700 }}>{ep.workTitle}</span>
                    <span style={{ color:C.accent, fontSize:13, fontWeight:700 }}>{ep.label}</span>
                  </div>
                  <div style={{ color:C.textMuted, fontSize:10, fontFamily:'monospace', marginBottom:2 }}>공개: {ep.publishDate}</div>
                  <div style={{ color:C.accentSoft, fontSize:11, fontWeight:700 }}>= {(rate*count).toLocaleString()}원</div>
                </div>
              ))}
            </div>
