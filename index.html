// ─── DeadlineTab ───────────────────────────────────────
function DeadlineTab({ works, schedules, setSchedules }) {
  const C = getC();
  const [showNewScheduleForm, setShowNewScheduleForm] = useState(false);
  const [scheduleForm, setScheduleForm] = useState({ workId: null, workTitle: "", startEpisodeNumber: "", startDate: "" });
  const [showNewHiatusForm, setShowNewHiatusForm] = useState(false);
  const [hiatusForm, setHiatusForm] = useState({ workId: null, startDate: "", endDate: "", reason: "" });

  const addSchedule = () => {
    if (!scheduleForm.startDate || !scheduleForm.startEpisodeNumber) return;
    const startNum = parseInt(scheduleForm.startEpisodeNumber);
    if (!startNum || startNum < 1) return;
    const startDate = new Date(scheduleForm.startDate);
    const episodes = [];
    for (let i = 0; i < 14; i++) {
      const epDate = new Date(startDate);
      epDate.setDate(epDate.getDate() + i * 7);
      const epNum = startNum + i;
      episodes.push({
        id: `ep_${Date.now()}_${i}`,
        number: epNum,
        label: `${epNum}화`,
        scheduledDate: epDate.toISOString().slice(0, 10),
        isShortHiatus: false,
        isDone: false,
        doneDate: null,
      });
    }
    const newSchedule = {
      id: `sched_${Date.now()}`,
      workId: scheduleForm.workId,
      workTitle: scheduleForm.workTitle,
      startEpisodeNumber: startNum,
      startDate: scheduleForm.startDate,
      episodes,
      transitions: [],
    };
    setSchedules(prev => [...prev, newSchedule]);
    setScheduleForm({ workId: null, workTitle: "", startEpisodeNumber: "", startDate: "" });
    setShowNewScheduleForm(false);
  };

  const updateSchedule = (scheduleId, patch) => {
    setSchedules(prev => prev.map(s => s.id === scheduleId ? { ...s, ...patch } : s));
  };

  const deleteSchedule = scheduleId => {
    setSchedules(prev => prev.filter(s => s.id !== scheduleId));
  };

  const addHiatus = () => {
    if (!hiatusForm.startDate || !hiatusForm.endDate) return;
    const newHiatus = {
      id: `lh_${Date.now()}`,
      workId: hiatusForm.workId,
      startDate: hiatusForm.startDate,
      endDate: hiatusForm.endDate,
      reason: hiatusForm.reason,
    };
    setLongHiatuses(prev => [...prev, newHiatus]);
    setHiatusForm({ workId: null, startDate: "", endDate: "", reason: "" });
    setShowNewHiatusForm(false);
  };

  const deleteHiatus = hiID => {
    setLongHiatuses(prev => prev.filter(h => h.id !== hiID));
  };

  const toggleEpisodeDone = (scheduleId, episodeId) => {
    setSchedules(prev => prev.map(s => {
      if (s.id !== scheduleId) return s;
      return {
        ...s,
        episodes: s.episodes.map(ep => {
          if (ep.id !== episodeId) return ep;
          return { ...ep, isDone: !ep.isDone, doneDate: !ep.isDone ? new Date().toISOString().slice(0, 10) : null };
        }),
      };
    }));
  };

  const toggleShortHiatus = (scheduleId, episodeId) => {
    setSchedules(prev => prev.map(s => {
      if (s.id !== scheduleId) return s;
      const targetIdx = s.episodes.findIndex(ep => ep.id === episodeId);
      if (targetIdx === -1) return s;
      const targetEp = s.episodes[targetIdx];
      const wasHiatus = targetEp.isShortHiatus;
      const delta = wasHiatus ? -7 : 7; // 해제시 -7, 설정시 +7
      const newEpisodes = s.episodes.map((ep, i) => {
        if (i === targetIdx) return { ...ep, isShortHiatus: !wasHiatus };
        if (i > targetIdx) {
          // 이후 화들 날짜 이동
          const d = new Date(ep.scheduledDate);
          d.setDate(d.getDate() + delta);
          return { ...ep, scheduledDate: d.toISOString().slice(0,10) };
        }
        return ep;
      });
      return { ...s, episodes: newEpisodes };
    }));
  };

  const deleteEpisode = (scheduleId, episodeId) => {
    setSchedules(prev => prev.map(s => {
      if (s.id !== scheduleId) return s;
      return { ...s, episodes: s.episodes.filter(ep => ep.id !== episodeId) };
    }));
  };

  return (
    <div>
      {/* 스케줄 관리 */}
      <div style={{ marginBottom: 24 }}>
        <div style={{ display: "flex", alignItems: "center", marginBottom: 12 }}>
          <div style={{ color: C.text, fontWeight: 700, fontSize: 16 }}>스케줄 관리</div>
          <button
            onClick={() => setShowNewScheduleForm(!showNewScheduleForm)}
            onMouseEnter={e => (e.currentTarget.style.background = C.borderLight)}
            onMouseLeave={e => (e.currentTarget.style.background = C.surfaceAlt)}
            style={{ marginLeft: "auto", background: C.surfaceAlt, border: `1px solid ${C.border}`, borderRadius: 8, color: C.textMuted, fontSize: 12, padding: "6px 12px", cursor: "pointer" }}>
            {showNewScheduleForm ? "▲ 취소" : "+ 새 스케줄"}
          </button>
        </div>

        {showNewScheduleForm && (
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px 16px", marginBottom: 16 }}>
            <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
              <select
                value={scheduleForm.workId || ""}
                onChange={e => {
                  const w = works.find(wk => String(wk.id) === e.target.value);
                  setScheduleForm(f => ({ ...f, workId: w?.id || null, workTitle: w?.title || "" }));
                }}
                style={{ flex: 1, background: C.surfaceAlt, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, fontSize: 13, padding: "8px 12px" }}>
                <option value="">작품 선택</option>
                {works.map(w => <option key={w.id} value={String(w.id)}>{w.title}</option>)}
              </select>
            </div>
            <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
              <input
                type="number"
                value={scheduleForm.startEpisodeNumber}
                onChange={e => setScheduleForm(f => ({ ...f, startEpisodeNumber: e.target.value }))}
                placeholder="시작 화수"
                style={{ width: 120, background: C.surfaceAlt, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, fontSize: 13, padding: "8px 12px" }}
              />
              <input
                type="date"
                value={scheduleForm.startDate}
                onChange={e => setScheduleForm(f => ({ ...f, startDate: e.target.value }))}
                style={{ flex: 1, background: C.surfaceAlt, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, fontSize: 13, padding: "8px 12px" }}
              />
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={addSchedule} style={{ flex: 1, background: C.accent, border: "none", borderRadius: 8, color: "#fff", fontWeight: 700, fontSize: 13, padding: "8px 12px", cursor: "pointer" }}>추가</button>
              <button onClick={() => setShowNewScheduleForm(false)} style={{ flex: 1, background: C.surfaceAlt, border: `1px solid ${C.border}`, borderRadius: 8, color: C.textMuted, fontSize: 13, padding: "8px 12px", cursor: "pointer" }}>취소</button>
            </div>
          </div>
        )}

        {schedules.map(schedule => (
          <div key={schedule.id} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px 16px", marginBottom: 12 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
              <div style={{ color: C.text, fontWeight: 700, fontSize: 14 }}>{schedule.workTitle}</div>
              <span style={{ color: C.textMuted, fontSize: 11 }}>시작: {schedule.startDate}</span>
              <button onClick={() => deleteSchedule(schedule.id)} style={{ marginLeft: "auto", background: "none", border: "none", color: C.border, cursor: "pointer", fontSize: 16 }}>×</button>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {schedule.episodes.map(ep => {
                const work = works.find(w => String(w.id) === String(schedule.workId));
                const isLongHiatus = work?.longHiatusStart && work?.longHiatusEnd && (() => {
                  const startDate = new Date(work.longHiatusStart);
                  const endDate = new Date(work.longHiatusEnd);
                  const epDate = new Date(ep.scheduledDate);
                  return epDate >= startDate && epDate <= endDate;
                })();
                return (
                  <div key={ep.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", background: ep.isDone ? C.surfaceAlt : C.bg, border: `1px solid ${C.borderLight}`, borderRadius: 8 }}>
                    <span style={{ color: C.textMuted, fontSize: 11, minWidth: 60 }}>{ep.scheduledDate}</span>
                    <input
                      value={ep.label}
                      onChange={e => updateSchedule(schedule.id, { episodes: schedule.episodes.map(e => e.id === ep.id ? { ...e, label: e.target.value } : e) })}
                      style={{ flex: 1, background: "transparent", border: "none", color: C.text, fontSize: 12, padding: "2px 0" }}
                    />
                    {isLongHiatus && <span style={{ background: "#9E7BB518", color: "#9E7BB5", fontSize: 10, padding: "2px 7px", borderRadius: 5 }}>장기휴재</span>}
                    {ep.isShortHiatus && <span style={{ background: "#C49A6C18", color: "#C49A6C", fontSize: 10, padding: "2px 7px", borderRadius: 5 }}>휴재</span>}
                    {ep.isDone && <span style={{ background: "#7A9E7E18", color: "#7A9E7E", fontSize: 10, padding: "2px 7px", borderRadius: 5 }}>완료</span>}
                    <button onClick={() => toggleShortHiatus(schedule.id, ep.id)} style={{ background: "none", border: `1px solid ${C.border}`, borderRadius: 6, color: C.textMuted, fontSize: 10, padding: "2px 8px", cursor: "pointer" }}>{ep.isShortHiatus ? "휴재 해제" : "단기휴재"}</button>
                    <button onClick={() => toggleEpisodeDone(schedule.id, ep.id)} style={{ background: "none", border: `1px solid ${C.border}`, borderRadius: 6, color: C.textMuted, fontSize: 10, padding: "2px 8px", cursor: "pointer" }}>{ep.isDone ? "미완료" : "완료"}</button>
                    <button onClick={() => deleteEpisode(schedule.id, ep.id)} style={{ background: "none", border: "none", color: C.border, cursor: "pointer", fontSize: 13 }}>×</button>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      {/* 장기 휴재 — works 기반 */}
      <div style={{ marginBottom: 24 }}>
        <div style={{ color: C.text, fontWeight: 700, fontSize: 16, marginBottom: 12 }}>장기 휴재</div>
        {works.filter(w => w.longHiatusStart && w.longHiatusEnd).length === 0 ? (
          <div style={{ color: C.textMuted, fontSize: 13, padding: "12px 0" }}>
            장기 휴재 중인 작품이 없습니다. 대시보드의 작품 카드에서 🗓 장기휴재 버튼으로 설정하세요.
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {works.filter(w => w.longHiatusStart && w.longHiatusEnd).map(w => {
              const startD = new Date(w.longHiatusStart);
              const endD = new Date(w.longHiatusEnd);
              const diffMs = endD - startD;
              const diffWeeks = Math.round(diffMs / (7 * 86400000));
              return (
                <div key={w.id} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px 16px", display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 10, height: 10, borderRadius: "50%", background: w.color, flexShrink: 0 }} />
                  <div>
                    <div style={{ color: C.text, fontWeight: 700, fontSize: 14 }}>{w.title}</div>
                    <div style={{ color: C.textMuted, fontSize: 12, marginTop: 3 }}>
                      {w.longHiatusStart} ~ {w.longHiatusEnd}
                      <span style={{ marginLeft: 8, color: "#9E7BB5", fontWeight: 700 }}>{diffWeeks}주 휴재</span>
                    </div>
                  </div>
                  <span style={{ marginLeft: "auto", background: "#9E7BB518", border: "1px solid #9E7BB544", borderRadius: 20, color: "#9E7BB5", fontSize: 11, fontWeight: 700, padding: "3px 12px" }}>휴재중</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────
function App() {
  const [themeId, setThemeId] = useLocalStorage("wt_theme", "ivory");
  _themeId = themeId;
  const C = getC();

  const [tab, setTab] = useState("dashboard");
  const [works, setWorks] = useLocalStorage("wt_works", []);
  const [todos, setTodos] = useLocalStorage("wt_todos", []);
  const [tasks, setTasks] = useLocalStorage("wt_assistants", []);
  const [taskTypes, setTaskTypes] = useLocalStorage("wt_taskTypes", [{ id:"type_assistant", label:"어시스턴트", color:"#9E7BB5" }]);
  const [planCategories, setPlanCategories] = useLocalStorage("wt_planCats", [
    { id:"cat_self", label:"본인", color:"#6E9EAD" },
    { id:"cat_asst", label:"어시스턴트", color:"#7A9E7E" },
  ]);
  const [planCatTitle, setPlanCatTitle] = useLocalStorage("wt_planCatTitle", "담당자");
  const [taskTypeTitle, setTaskTypeTitle] = useLocalStorage("wt_taskTypeTitle", "업무 유형");
  const [researches, setResearches] = useLocalStorage("wt_researches", []);
  const [resCats, setResCats] = useLocalStorage("wt_resCats", DEFAULT_RES_CATS);
  const [lastExport, setLastExport] = useLocalStorage("wt_lastExport", null);
  const [assistantSettings, setAssistantSettings] = useLocalStorage("wt_assistantSettings", {
    names: ['어시스턴트 A', '어시스턴트 B'],
    ratePerEpisode: 250000,
    count: 2
  });
  const [monthlyChecklist, setMonthlyChecklist] = useLocalStorage("wt_monthlyChecklist", {});
  const [schedules, setSchedules] = useLocalStorage("wt_schedules", []);
  const [longHiatuses, setLongHiatuses] = useLocalStorage("wt_longHiatuses", []);
  const [saved, setSaved] = useState(true);
  const [showTheme, setShowTheme] = useState(false);
  const [cloudStatus, setCloudStatus] = useState("idle"); // "idle"|"syncing"|"ok"|"error"
  const [lastCloudSync, setLastCloudSync] = useState(() => localStorage.getItem("wt_lastSync") || null);
  const [cloudLoading, setCloudLoading] = useState(true);
  const fileInputRef = useRef(null);
  const syncTimerRef = useRef(null);

  // 로컬 저장 배지
  useEffect(() => {
    setSaved(false);
    const t = setTimeout(() => setSaved(true), 800);
    return () => clearTimeout(t);
  }, [works,todos,tasks,taskTypes,planCategories,researches,resCats,assistantSettings,monthlyChecklist,schedules]);

  // 클라우드 자동 저장 (데이터 변경 후 3초 디바운스)
  useEffect(() => {
    if (cloudLoading) return; // 초기 로딩 중엔 저장 안 함
    if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
    syncTimerRef.current = setTimeout(async () => {
      setCloudStatus("syncing");
      const data = { works, todos, tasks, taskTypes, planCategories, planCatTitle, taskTypeTitle, researches, resCats, themeId, assistantSettings, monthlyChecklist, schedules, longHiatuses, syncedAt: new Date().toISOString(), version: 2 };
      const result = await cloudSave(data);
      if (result.ok) {
        setCloudStatus("ok");
        const now = new Date().toISOString();
        setLastCloudSync(now);
        localStorage.setItem("wt_lastSync", now);
        setTimeout(() => setCloudStatus("idle"), 3000);
      } else {
        setCloudStatus("error");
      }
    }, 3000);
    return () => clearTimeout(syncTimerRef.current);
  }, [works,todos,tasks,taskTypes,planCategories,planCatTitle,taskTypeTitle,researches,resCats,themeId,assistantSettings,monthlyChecklist,schedules,longHiatuses,cloudLoading]);

  // 앱 시작 시 클라우드에서 데이터 불러오기
  useEffect(() => {
    (async () => {
      setCloudStatus("syncing");
      const data = await cloudLoad();
      if (data) {
        if (data.works)               setWorks(data.works);
        if (data.todos)               setTodos(data.todos);
        if (data.tasks)               setTasks(data.tasks);
        if (data.taskTypes)           setTaskTypes(data.taskTypes);
        if (data.planCategories)      setPlanCategories(data.planCategories);
        if (data.planCatTitle)        setPlanCatTitle(data.planCatTitle);
        if (data.taskTypeTitle)       setTaskTypeTitle(data.taskTypeTitle);
        if (data.researches)          setResearches(data.researches);
        if (data.resCats)             setResCats(data.resCats);
        if (data.themeId)             { setThemeId(data.themeId); _themeId=data.themeId; document.body.style.background=THEMES.find(t=>t.id===data.themeId)?.bg||""; }
        if (data.assistantSettings)   setAssistantSettings(data.assistantSettings);
        if (data.monthlyChecklist)    setMonthlyChecklist(data.monthlyChecklist);
        if (data.schedules)           setSchedules(data.schedules);
        if (data.longHiatuses)        setLongHiatuses(data.longHiatuses);
        if (data.syncedAt) {
          setLastCloudSync(data.syncedAt);
          localStorage.setItem("wt_lastSync", data.syncedAt);
        }
        setCloudStatus("ok");
        setTimeout(() => setCloudStatus("idle"), 2000);
      } else {
        setCloudStatus("idle");
      }
      setCloudLoading(false);
    })();
  }, []);

  useEffect(() => { document.body.style.background=C.bg; }, [themeId]);

  // 내보내기
  const handleExport = () => {
    const data = { works, todos, tasks, taskTypes, planCategories, planCatTitle, taskTypeTitle, researches, resCats, themeId, assistantSettings, monthlyChecklist, schedules, longHiatuses, exportedAt: new Date().toISOString(), version: 2 };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const dateStr = new Date().toISOString().slice(0,10);
    a.href = url; a.download = `webtoon-tracker-${dateStr}.json`;
    a.click(); URL.revokeObjectURL(url);
    setLastExport(new Date().toISOString());
  };

  // 불러오기
  const handleImport = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!confirm("현재 데이터를 불러온 파일로 덮어씁니다. 계속할까요?")) { e.target.value=""; return; }
        if (data.works)               setWorks(data.works);
        if (data.todos)               setTodos(data.todos);
        if (data.tasks)               setTasks(data.tasks);
        if (data.taskTypes)           setTaskTypes(data.taskTypes);
        if (data.planCategories)      setPlanCategories(data.planCategories);
        if (data.planCatTitle)        setPlanCatTitle(data.planCatTitle);
        if (data.taskTypeTitle)       setTaskTypeTitle(data.taskTypeTitle);
        if (data.researches)          setResearches(data.researches);
        if (data.resCats)             setResCats(data.resCats);
        if (data.assistantSettings)   setAssistantSettings(data.assistantSettings);
        if (data.monthlyChecklist)    setMonthlyChecklist(data.monthlyChecklist);
        if (data.schedules)           setSchedules(data.schedules);
        if (data.longHiatuses)        setLongHiatuses(data.longHiatuses);
        if (data.themeId)             { setThemeId(data.themeId); _themeId=data.themeId; }
        setLastExport(data.exportedAt||null);
        alert("불러오기 완료!");
      } catch { alert("파일을 읽을 수 없어요. JSON 파일인지 확인해주세요."); }
      e.target.value="";
    };
    reader.readAsText(file);
  };

  const exportDaysAgo = useMemo(() => {
    if (!lastExport) return null;
    return Math.floor((Date.now() - new Date(lastExport).getTime()) / 86400000);
  }, [lastExport]);
  const exportWarning = exportDaysAgo === null || exportDaysAgo >= 7;

  const updateWork = u => setWorks(prev => prev.map(w => w.id===u.id ? u : w));
  const deleteWork = id => setWorks(prev => prev.filter(w => w.id!==id));
  const addWork = () => setWorks(prev => [...prev, {
    id: Date.now(),
    title: `작품 ${String.fromCharCode(65+prev.length)}`,
    color: PRESET_COLORS[prev.length % PRESET_COLORS.length],
    episodes: [],
    serialDay: null,
    hiatus: false,
    longHiatusStart: "",
    longHiatusEnd: "",
  }]);

  const tabs = [
    { id:"dashboard", label:"대시보드" },
    { id:"calendar",  label:"캘린더" },
    { id:"deadline",  label:"📅 마감" },
    { id:"workmgmt",  label:"업무 관리" },
    { id:"cost",      label:"💰 비용 관리" },
    { id:"research",  label:"자료조사" },
    { id:"archive",   label:"완료 아카이브" },
  ];

  // 클라우드에서 데이터 로딩 중 스피너
  if (cloudLoading) {
    return (
      <div style={{ minHeight:"100vh", background:C.bg, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16 }}>
        <div style={{ fontSize:32 }}>☁</div>
        <div style={{ color:C.textMuted, fontSize:14 }}>클라우드에서 데이터를 불러오는 중…</div>
        <div style={{ width:200, height:3, background:C.borderLight, borderRadius:99, overflow:"hidden" }}>
          <div style={{ width:"60%", height:"100%", background:C.accentSoft, borderRadius:99, animation:"pulse 1.2s ease-in-out infinite" }} />
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight:"100vh", background:C.bg }}>
      {/* Header */}
      <div style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, padding:"14px 28px", display:"flex", alignItems:"center", gap:14, flexWrap:"wrap" }}>
        <div style={{ display:"flex", gap:3, alignItems:"center" }}>
          {works.map(w => <div key={w.id} style={{ width:5, height:20, borderRadius:3, background:w.color, opacity:0.65 }} />)}
        </div>
        <div>
          <div style={{ color:C.text, fontWeight:900, fontSize:16, letterSpacing:-0.3 }}>웹툰 마감 트래커</div>
          <div style={{ color:C.textMuted, fontSize:11 }}>{works.length}개 작품 연재 중</div>
        </div>
        <SaveBadge saved={saved} />
        {/* 클라우드 동기화 상태 배지 */}
        <span style={{
          fontSize:11,
          padding:"3px 10px",
          borderRadius:6,
          border:`1px solid ${cloudStatus==="error"?"#DDB8B8":cloudStatus==="syncing"?"#C4A882":cloudStatus==="ok"?"#A0C8A0":C.border}`,
          background:cloudStatus==="error"?"#F5E8E8":cloudStatus==="syncing"?C.surfaceAlt:cloudStatus==="ok"?"#EFF8EF":C.surfaceAlt,
          color:cloudStatus==="error"?"#B07070":cloudStatus==="syncing"?C.accentSoft:cloudStatus==="ok"?"#5A8A5A":C.textMuted,
          transition:"all 0.4s",
          cursor: cloudStatus==="error"?"pointer":"default",
        }}
          onClick={cloudStatus==="error" ? async ()=>{
            setCloudStatus("syncing");
            const data = { works,todos,tasks,taskTypes,planCategories,planCatTitle,taskTypeTitle,researches,resCats,themeId,assistantSettings,monthlyChecklist,schedules,longHiatuses,syncedAt:new Date().toISOString(),version:2 };
            const result = await cloudSave(data);
            if(result.ok){ setCloudStatus("ok"); setTimeout(()=>setCloudStatus("idle"),3000); } else setCloudStatus("error");
          } : undefined}
        >
          {cloudStatus==="syncing" ? "☁ 동기화 중…" : cloudStatus==="ok" ? "☁ 동기화 완료" : cloudStatus==="error" ? "☁ 오류 — 클릭하여 재시도" : lastCloudSync ? `☁ ${new Date(lastCloudSync).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})} 동기화` : "☁ 클라우드 연결 중"}
        </span>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          {exportWarning
            ? <span style={{ background:"#F5E8E8", color:"#B07070", border:"1px solid #DDB8B8", borderRadius:7, fontSize:11, padding:"3px 10px", fontWeight:700, cursor:"pointer" }} onClick={handleExport}>
                {exportDaysAgo===null ? "⚠ 백업 없음" : `⚠ ${exportDaysAgo}일 전 백업`} — 지금 저장
              </span>
            : <span style={{ color:C.textMuted, fontSize:11 }}>백업 {exportDaysAgo}일 전</span>
          }
        </div>
        <button onClick={handleExport} onMouseEnter={e=>e.currentTarget.style.background=C.surfaceAlt} onMouseLeave={e=>e.currentTarget.style.background="transparent"} style={{ background:"transparent", border:`1px solid ${C.border}`, borderRadius:8, color:C.textMuted, fontSize:11, padding:"4px 10px", cursor:"pointer" }}>💾 내보내기</button>
        <button onClick={()=>fileInputRef.current?.click()} onMouseEnter={e=>e.currentTarget.style.background=C.surfaceAlt} onMouseLeave={e=>e.currentTarget.style.background="transparent"} style={{ background:"transparent", border:`1px solid ${C.border}`, borderRadius:8, color:C.textMuted, fontSize:11, padding:"4px 10px", cursor:"pointer" }}>📂 불러오기</button>
        <input ref={fileInputRef} type="file" accept=".json" onChange={handleImport} style={{ display:"none" }} />
        <button onClick={()=>setShowTheme(true)} onMouseEnter={e=>e.currentTarget.style.background=C.surfaceAlt} onMouseLeave={e=>e.currentTarget.style.background="transparent"} style={{ background:"transparent", border:`1px solid ${C.border}`, borderRadius:8, color:C.textMuted, fontSize:11, padding:"4px 10px", cursor:"pointer" }}>🎨 테마</button>
        <div style={{ marginLeft:"auto", display:"flex", gap:5, flexWrap:"wrap" }}>
          {tabs.map(t => (
            <button key={t.id} onClick={()=>setTab(t.id)}
              onMouseEnter={e=>{ if(tab!==t.id) e.currentTarget.style.background=C.surfaceAlt; }}
              onMouseLeave={e=>{ if(tab!==t.id) e.currentTarget.style.background="transparent"; }}
              style={{ background:tab===t.id?C.accent:"transparent", border:`1px solid ${tab===t.id?C.accent:C.border}`, borderRadius:8, color:tab===t.id?"#fff":C.textMid, fontWeight:tab===t.id?700:400, fontSize:13, padding:"5px 13px", cursor:"pointer", transition:"all 0.15s" }}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      <UrgentBanner works={works} />
      <MonthlyAlertBanner works={works} assistantSettings={assistantSettings} monthlyChecklist={monthlyChecklist} setMonthlyChecklist={setMonthlyChecklist} />

      <div style={{ maxWidth:960, margin:"0 auto", padding:"24px 20px" }}>
        {tab==="dashboard" && (
          <div>
            <div style={{ display:"flex", flexDirection:"column", gap:16, marginBottom:20 }}>
              {works.map(w => <WorkCard key={w.id} work={w} onUpdate={updateWork} onDelete={deleteWork} />)}
              <button onClick={addWork}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accentSoft;e.currentTarget.style.color=C.accent;}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.textMuted;}}
                style={{ background:"transparent", border:`1.5px dashed ${C.border}`, borderRadius:18, color:C.textMuted, fontSize:13, cursor:"pointer", minHeight:100, transition:"all 0.15s" }}>
                + 작품 추가
              </button>
            </div>
            <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:16, padding:"16px 18px" }}>
              <div style={{ color:C.textMuted, fontSize:11, marginBottom:12 }}>작업 단계 현황</div>
              <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                {STAGES.map(stage => {
                  const wp = works.map(w => {
                    const eps = (w.episodes||[]).filter(e=>!e.doneAt);
                    const avg = eps.length>0 ? Math.round(eps.reduce((s,e)=>s+(e.stageProgress?.[stage]||0),0)/eps.length) : 0;
                    return { w, pct:avg };
                  }).filter(({pct})=>pct>0);
                  const any = wp.length>0;
                  return (
                    <div key={stage} style={{ background:any?C.surfaceAlt:C.bg, border:`1px solid ${any?C.border:C.borderLight}`, borderRadius:9, padding:"7px 12px", display:"flex", flexDirection:"column", alignItems:"center", gap:6, minWidth:72 }}>
                      <span style={{ color:any?C.textMid:C.textMuted, fontSize:11, fontWeight:any?700:400 }}>{stage}</span>
                      <div style={{ display:"flex", flexDirection:"column", gap:4, width:"100%" }}>
                        {any ? wp.map(({w,pct})=>(
                          <div key={w.id}>
                            <div style={{ width:"100%", background:C.borderLight, borderRadius:99, height:4, overflow:"hidden" }}>
                              <div style={{ width:`${pct}%`, height:"100%", background:w.color, opacity:0.7, borderRadius:99, transition:"width 0.3s" }} />
                            </div>
                            <div style={{ display:"flex", alignItems:"center", gap:3, marginTop:2 }}>
                              <div style={{ width:5, height:5, borderRadius:"50%", background:w.color, opacity:0.65 }} />
                              <span style={{ color:C.textMuted, fontSize:9, fontFamily:"monospace" }}>{pct}%</span>
                            </div>
                          </div>
                        )) : <div style={{ display:"flex", justifyContent:"center" }}><div style={{ width:6, height:6, borderRadius:"50%", background:C.border }} /></div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {tab==="calendar" && <CalendarTab works={works} todos={todos} setTodos={setTodos} tasks={tasks} setTasks={setTasks} planCategories={planCategories} taskTypes={taskTypes} schedules={schedules} researches={researches} />}
        {tab==="deadline" && <DeadlineTab works={works} schedules={schedules} setSchedules={setSchedules} />}
        {tab==="workmgmt" && <WorkMgmtTab works={works} tasks={tasks} setTasks={setTasks} taskTypes={taskTypes} setTaskTypes={setTaskTypes} taskTypeTitle={taskTypeTitle} setTaskTypeTitle={setTaskTypeTitle} />}
        {tab==="cost"     && <CostManagementTab works={works} assistantSettings={assistantSettings} setAssistantSettings={setAssistantSettings} monthlyChecklist={monthlyChecklist} setMonthlyChecklist={setMonthlyChecklist} />}
        {tab==="research" && <ResearchTab works={works} researches={researches} setResearches={setResearches} resCats={resCats} setResCats={setResCats} />}
        {tab==="archive"  && <ArchiveTab works={works} onUpdateWork={updateWork} todos={todos} setTodos={setTodos} tasks={tasks} setTasks={setTasks} taskTypes={taskTypes} planCategories={planCategories} />}
      </div>

      {showTheme && <ThemeModal themeId={themeId} setThemeId={id=>{setThemeId(id);_themeId=id;document.body.style.background=THEMES.find(t=>t.id===id)?.bg||"";}} onClose={()=>setShowTheme(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
