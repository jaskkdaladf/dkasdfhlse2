<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웹툰 마감 트래커</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; }
input[type=range] { height: 4px; cursor: pointer; }
::-webkit-scrollbar { width: 4px; }
@keyframes pulse { 0%,100% { opacity:0.4; transform:translateX(-30%); } 50% { opacity:1; transform:translateX(30%); } }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }
input[type=date]::-webkit-calendar-picker-indicator { opacity: 0.35; cursor: pointer; }
input:focus { outline: none; }
button:focus { outline: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

const STAGES = ["글콘티","그림콘티","3D배치","펜터치","밑색","명암","후보정","마감"];
const DAYS_KO = ["일","월","화","수","목","금","토"];
function getDeadlineDay(serialDay) {
  // 연재요일 인덱스(0=일)에서 마감일(연재-1일) 계산
  if (serialDay === null || serialDay === undefined) return null;
  return ((serialDay - 1) + 7) % 7;
}
const PRESET_COLORS = ["#C17B7B","#C49A6C","#B5A96A","#7A9E7E","#6E9EAD","#7B89BE","#9E7BB5","#B5727E","#6BAA9F","#A89070","#8E7BA8","#7B9BAE"];

const THEMES = [
  { id:"ivory",    label:"아이보리",  bg:"#F5F0E8", surface:"#FDFAF4", surfaceAlt:"#F0EBE0", border:"#E2DAC8", borderLight:"#EDE7D8", text:"#3A3530", textMid:"#7A7268", textMuted:"#A89E90", accent:"#8B7355", accentSoft:"#C4A882" },
  { id:"sage",     label:"세이지",    bg:"#EEF2EC", surface:"#F7FAF6", surfaceAlt:"#E5EDE3", border:"#C8D8C4", borderLight:"#D8E6D4", text:"#2E3A2C", textMid:"#607060", textMuted:"#8FA88A", accent:"#5A7A56", accentSoft:"#8FAF8A" },
  { id:"lavender", label:"라벤더",    bg:"#F0EEF8", surface:"#FAF9FE", surfaceAlt:"#E8E5F4", border:"#D4CFEA", borderLight:"#E4E0F2", text:"#2E2A42", textMid:"#68608A", textMuted:"#9E96BE", accent:"#6B5FA8", accentSoft:"#A898D8" },
  { id:"rose",     label:"로즈",      bg:"#F8EEF0", surface:"#FEF8FA", surfaceAlt:"#F2E4E8", border:"#E8CACE", borderLight:"#F0DAE0", text:"#3A2A2E", textMid:"#8A6068", textMuted:"#B89298", accent:"#A85870", accentSoft:"#D898AA" },
  { id:"slate",    label:"슬레이트",  bg:"#EAECF0", surface:"#F5F6F9", surfaceAlt:"#DFE2E8", border:"#C8CDD8", borderLight:"#D8DCE8", text:"#252C3A", textMid:"#56607A", textMuted:"#8890A8", accent:"#455A8A", accentSoft:"#7888B8" },
  { id:"sand",     label:"샌드",      bg:"#F2EDE4", surface:"#FAF6EE", surfaceAlt:"#EAE4D8", border:"#D8CEBC", borderLight:"#E4DACC", text:"#362E22", textMid:"#7A6E5C", textMuted:"#ACA090", accent:"#8A7252", accentSoft:"#C0A878" },
];

let _themeId = "ivory";
function getC() { return THEMES.find(t => t.id === _themeId) || THEMES[0]; }

// ─── JSONBin Cloud Sync ───────────────────────────────
const JSONBIN_API_KEY = "$2a$10$6ixl95C04MMgvq.ZGhdEY.J97LvVL3fAi/9tyC298fLPaogsktHeS";
const JSONBIN_BIN_KEY = "wt_jsonbin_id";

async function cloudLoad() {
  const binId = localStorage.getItem(JSONBIN_BIN_KEY);
  if (!binId) return null;
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
      headers: { "X-Master-Key": JSONBIN_API_KEY }
    });
    if (!res.ok) return null;
    const json = await res.json();
    return json.record;
  } catch { return null; }
}

async function cloudSave(data) {
  const binId = localStorage.getItem(JSONBIN_BIN_KEY);
  if (binId) {
    // 기존 bin 업데이트
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_API_KEY },
        body: JSON.stringify(data)
      });
      if (res.ok) return { ok: true, binId };
    } catch {}
  }
  // 새 bin 생성
  try {
    const res = await fetch("https://api.jsonbin.io/v3/b", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": JSONBIN_API_KEY,
        "X-Bin-Name": "webtoon-tracker",
        "X-Bin-Private": "true"
      },
      body: JSON.stringify(data)
    });
    if (res.ok) {
      const json = await res.json();
      const newId = json.metadata.id;
      localStorage.setItem(JSONBIN_BIN_KEY, newId);
      return { ok: true, binId: newId };
    }
  } catch {}
  return { ok: false };
}

function useLocalStorage(key, initial) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; } catch { return initial; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

function getDday(dl) {
  if (!dl) return { label: "-", urgent: false, diff: 9999 };
  const t = new Date(); t.setHours(0,0,0,0);
  const d = new Date(dl); d.setHours(0,0,0,0);
  const diff = Math.round((d - t) / 86400000);
  if (diff === 0) return { label:"D-DAY", urgent:true, diff:0 };
  if (diff < 0)  return { label:`D+${Math.abs(diff)}`, urgent:true, diff };
  return { label:`D-${diff}`, urgent: diff <= 3, diff };
}

function getOverallProgress(sp) {
  const v = Object.values(sp || {});
  if (!v.length) return 0;
  return Math.round(v.reduce((a,b) => a+b, 0) / v.length);
}

function getAutoCurrentStage(sp) {
  if (!sp) return STAGES[0];
  const ip = STAGES.find(s => sp[s] > 0 && sp[s] < 100);
  if (ip) return ip;
  if (!STAGES.some(s => sp[s] > 0)) return STAGES[0];
  const ld = [...STAGES].map((s,i) => sp[s]===100 ? i : -1).filter(i=>i>=0).pop();
  return STAGES[ld+1] || "완료";
}

function newEpisodeData(epNum) {
  return {
    id: `ep_${Date.now()}_${Math.random().toString(36).slice(2)}`,
    label: `${epNum}화`,
    epNum: epNum,
    stageProgress: Object.fromEntries(STAGES.map(s => [s,0])),
    pageCheck: {},
    totalPages: 20,
    completedPages: 0,
    deadline: "",
    memo: "",
    doneAt: null,
  };
}

// ─── SaveBadge ────────────────────────────────────────
function SaveBadge({ saved }) {
  const C = getC();
  return (
    <span style={{ fontSize:11, color:saved?C.textMuted:C.accentSoft, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:6, padding:"3px 10px", transition:"color 0.5s" }}>
      {saved ? "✓ 저장됨" : "저장 중…"}
    </span>
  );
}

// ─── ColorPickerModal ─────────────────────────────────
function ColorPickerModal({ color, onSelect, onClose }) {
  const C = getC();
  const [custom, setCustom] = useState(color);
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.3)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:16, padding:24, minWidth:280, boxShadow:"0 8px 32px rgba(0,0,0,0.12)" }}>
        <div style={{ color:C.text, fontWeight:700, marginBottom:16, fontSize:14 }}>컬러 선택</div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:8, marginBottom:16 }}>
          {PRESET_COLORS.map(c => (
            <button key={c} onClick={()=>{onSelect(c);onClose();}} style={{ width:34, height:34, borderRadius:"50%", background:c, border:c===color?`3px solid ${C.text}`:`2px solid ${C.border}`, cursor:"pointer" }} />
          ))}
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <input type="color" value={custom} onChange={e=>setCustom(e.target.value)} style={{ width:38, height:38, border:`1px solid ${C.border}`, borderRadius:8, cursor:"pointer" }} />
          <span style={{ color:C.textMuted, fontSize:12 }}>직접 입력</span>
          <button onClick={()=>{onSelect(custom);onClose();}} style={{ marginLeft:"auto", background:custom, color:"#fff", border:"none", borderRadius:8, padding:"6px 14px", cursor:"pointer", fontWeight:700, fontSize:12 }}>적용</button>
        </div>
      </div>
    </div>
  );
}

// ─── ThemeModal ───────────────────────────────────────
function ThemeModal({ themeId, setThemeId, onClose }) {
  const C = getC();
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.3)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:18, padding:24, minWidth:340, boxShadow:"0 8px 32px rgba(0,0,0,0.12)" }}>
        <div style={{ color:C.text, fontWeight:700, fontSize:15, marginBottom:18 }}>UI 테마</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          {THEMES.map(theme => (
            <button key={theme.id} onClick={()=>{setThemeId(theme.id);_themeId=theme.id;document.body.style.background=theme.bg;onClose();}}
              style={{ background:theme.bg, border:`2px solid ${themeId===theme.id?theme.accent:theme.border}`, borderRadius:12, padding:"12px 14px", cursor:"pointer", textAlign:"left", boxShadow:themeId===theme.id?`0 0 0 1px ${theme.accent}`:"none", transition:"all 0.15s" }}>
              <div style={{ display:"flex", gap:5, marginBottom:8 }}>
                {[theme.accent,theme.accentSoft,theme.border,theme.textMuted].map((c,i) => <div key={i} style={{ width:14, height:14, borderRadius:"50%", background:c }} />)}
              </div>
              <div style={{ color:theme.text, fontWeight:themeId===theme.id?700:500, fontSize:13 }}>{theme.label}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── UrgentBanner ─────────────────────────────────────
function UrgentBanner({ works }) {
  const C = getC();
  const urgent = useMemo(() => {
    const items = [];
    works.forEach(w => {
      (w.episodes || []).forEach(ep => {
        if (!ep.deadline || ep.doneAt) return;
        const dd = getDday(ep.deadline);
        if (dd.diff <= 3) items.push({ workTitle:w.title, workColor:w.color, epLabel:ep.label, dday:dd });
      });
    });
    return items.sort((a,b) => a.dday.diff - b.dday.diff);
  }, [works]);

  if (!urgent.length) return null;

  return (
    <div style={{ background:"#FFF0EE", borderBottom:"1px solid #F0CACA", padding:"10px 28px", display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
      <span style={{ color:"#B07070", fontWeight:700, fontSize:12, flexShrink:0 }}>⚠ 마감 임박</span>
      {urgent.map((item, i) => (
        <span key={i} style={{ background:"#FDE8E8", color:"#B07070", border:"1px solid #F0CACA", borderRadius:7, padding:"2px 10px", fontSize:11 }}>
          <span style={{ color:item.workColor, fontWeight:700 }}>{item.workTitle}</span> {item.epLabel} — {item.dday.label}
        </span>
      ))}
    </div>
  );
}

// ─── WorkCard ─────────────────────────────────────────
function WorkCard({ work, onUpdate, onDelete }) {
  const C = getC();
  const [collapsed, setCollapsed] = useState(false);
  const [editingTitle, setEditingTitle] = useState(false);
  const [titleVal, setTitleVal] = useState(work.title);
  const [showColorPicker, setShowColorPicker] = useState(false);
  const [expandPageCheck, setExpandPageCheck] = useState(true);
  const [expandMemo, setExpandMemo] = useState(false);
  const [showAddEp, setShowAddEp] = useState(false);
  const [newEpNum, setNewEpNum] = useState("");
  const [showArchiveConfirm, setShowArchiveConfirm] = useState(false);
  const [showHiatusEdit, setShowHiatusEdit] = useState(false);
  const isDraggingRef = useRef(false);
  const dragValueRef = useRef(null);

  const episodes = work.episodes || [];
  const activeEpisodes = episodes.filter(ep => !ep.doneAt);
  const [activeEpId, setActiveEpId] = useState(activeEpisodes[0]?.id || null);
  const activeEp = episodes.find(e => e.id === activeEpId) || episodes[0] || null;

  const updateEp = (epId, patch) => {
    onUpdate({ ...work, episodes: episodes.map(e => e.id===epId ? {...e,...patch} : e) });
  };

  const addEpisode = () => {
    const num = parseInt(newEpNum);
    if (!num || num < 1) return;
    if (episodes.find(e => e.epNum === num)) { alert(`${num}화는 이미 있어요`); return; }
    const ne = newEpisodeData(num);
    const sorted = [...episodes, ne].sort((a,b) => a.epNum - b.epNum);
    onUpdate({ ...work, episodes: sorted });
    setActiveEpId(ne.id);
    setNewEpNum("");
    setShowAddEp(false);
  };

  const removeEpisode = (epId) => {
    if (activeEpisodes.length === 1) return;
    const ne = episodes.filter(e => e.id !== epId);
    onUpdate({ ...work, episodes: ne });
    if (activeEpId === epId) setActiveEpId(ne.filter(e=>!e.doneAt)[0]?.id || null);
  };

  const handleTitleBlur = () => {
    setEditingTitle(false);
    if (titleVal.trim()) onUpdate({ ...work, title: titleVal.trim() });
    else setTitleVal(work.title);
  };

  const sp = activeEp?.stageProgress || Object.fromEntries(STAGES.map(s=>[s,0]));
  const pageCheck = activeEp?.pageCheck || {};
  const overall = getOverallProgress(sp);
  const dday = getDday(activeEp?.deadline || "");
  const totalPages = activeEp?.totalPages || 20;
  const pages = Array.from({ length: totalPages }, (_, i) => i + 1);
  const currentStage = getAutoCurrentStage(sp);

  const togglePageCheck = (page, stage) => {
    const key = `${page}-${stage}`;
    const nc = { ...pageCheck, [key]: !pageCheck[key] };
    const np = { ...sp };
    STAGES.forEach(s => {
      const cnt = pages.filter(p => nc[`${p}-${s}`]).length;
      np[s] = pages.length > 0 ? Math.round((cnt / pages.length) * 100) : 0;
    });
    const cp = pages.filter(p => STAGES.every(s => nc[`${p}-${s}`])).length;
    updateEp(activeEp.id, { pageCheck: nc, stageProgress: np, completedPages: cp });
  };

  const handleCellMouseDown = (page, stage, e) => {
    isDraggingRef.current = true;
    const key = `${page}-${stage}`;
    dragValueRef.current = !pageCheck[key];
    togglePageCheck(page, stage);
  };

  const handleCellMouseEnter = (page, stage) => {
    if (!isDraggingRef.current || dragValueRef.current === null) return;
    const key = `${page}-${stage}`;
    const currentState = !!pageCheck[key];
    if (currentState !== dragValueRef.current) {
      togglePageCheck(page, stage);
    }
  };

  const handleMouseUp = () => {
    isDraggingRef.current = false;
    dragValueRef.current = null;
  };

  const checkAllPages = () => {
    const nc = {};
    pages.forEach(p => STAGES.forEach(s => { nc[`${p}-${s}`] = true; }));
    const np = Object.fromEntries(STAGES.map(s => [s, 100]));
    updateEp(activeEp.id, { pageCheck: nc, stageProgress: np, completedPages: totalPages });
  };

  const uncheckAllPages = () => {
    updateEp(activeEp.id, { pageCheck: {}, stageProgress: Object.fromEntries(STAGES.map(s=>[s,0])), completedPages: 0 });
  };

  const markDone = () => {
    setShowArchiveConfirm(true);
  };
  const confirmMarkDone = () => {
    checkAllPages();
    updateEp(activeEp.id, { doneAt: new Date().toISOString() });
    setShowArchiveConfirm(false);
  };

  const btnBase = { background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:8, color:C.textMuted, fontSize:11, padding:"5px 12px", cursor:"pointer", width:"100%", transition:"background 0.15s" };

  return (
    <div
      onMouseEnter={e=>{e.currentTarget.style.boxShadow="0 4px 20px rgba(0,0,0,0.08)";e.currentTarget.style.borderColor=work.color+"88";}}
      onMouseLeave={e=>{e.currentTarget.style.boxShadow="none";e.currentTarget.style.borderColor=C.border;}}
      style={{ background:C.surface, border:`1.5px solid ${C.border}`, borderRadius:18, overflow:"hidden", transition:"box-shadow 0.2s,border-color 0.2s", display:"flex" }}>

      {/* 좌측 컬러 세로 바 — 클릭하면 접기/펼치기 */}
      <div
        onClick={()=>setCollapsed(c=>!c)}
        title={collapsed?"펼치기":"접기"}
        style={{ width:5, flexShrink:0, background:work.color, opacity:0.75, cursor:"pointer", transition:"opacity 0.15s" }}
        onMouseEnter={e=>e.currentTarget.style.opacity=1}
        onMouseLeave={e=>e.currentTarget.style.opacity=0.75}
      />

      <div style={{ flex:1, padding: collapsed?"12px 16px":"20px 20px", minWidth:0 }}>

        {/* ── 접힌 상태 한 줄 ── */}
        {collapsed && (
          <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"nowrap", overflow:"hidden" }}>
            <button onClick={()=>setShowColorPicker(true)}
              onMouseEnter={e=>e.target.style.transform="scale(1.3)"}
              onMouseLeave={e=>e.target.style.transform="scale(1)"}
              style={{ width:11, height:11, borderRadius:"50%", background:work.color, border:`2px solid ${C.border}`, cursor:"pointer", flexShrink:0, transition:"transform 0.15s" }} />
            <span style={{ color:C.text, fontWeight:700, fontSize:14, flexShrink:0, maxWidth:120, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{work.title}</span>
            <span style={{ color:C.borderLight, fontSize:11, flexShrink:0 }}>│</span>
            {activeEp && <span style={{ color:C.textMuted, fontSize:12, flexShrink:0 }}>{activeEp.label}</span>}
            {activeEp && <span style={{ color:C.borderLight, fontSize:11, flexShrink:0 }}>│</span>}
            {activeEp && <span style={{ color:work.color, fontSize:12, fontWeight:700, flexShrink:0 }}>{currentStage}</span>}
            {activeEp && <span style={{ color:C.borderLight, fontSize:11, flexShrink:0 }}>│</span>}
            {activeEp && (
              <div style={{ display:"flex", alignItems:"center", gap:5, flex:1, minWidth:60 }}>
                <div style={{ flex:1, background:C.surfaceAlt, borderRadius:99, height:4, overflow:"hidden", border:`1px solid ${C.borderLight}` }}>
                  <div style={{ width:`${overall}%`, height:"100%", background:work.color, opacity:0.65, borderRadius:99, transition:"width 0.4s" }} />
                </div>
                <span style={{ color:work.color, fontSize:11, fontWeight:700, fontFamily:"monospace", flexShrink:0 }}>{overall}%</span>
              </div>
            )}
            {activeEp?.deadline && (
              <span style={{ background:dday.urgent?"#F5E8E8":C.surfaceAlt, color:dday.urgent?"#B07070":C.textMuted, border:`1px solid ${dday.urgent?"#DDB8B8":C.border}`, borderRadius:6, padding:"1px 7px", fontSize:10, fontWeight:700, fontFamily:"monospace", flexShrink:0 }}>{dday.label}</span>
            )}
            <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:4, flexShrink:0 }}>
              <button onClick={()=>onDelete(work.id)} onMouseEnter={e=>e.target.style.color="#B07070"} onMouseLeave={e=>e.target.style.color=C.border} style={{ background:"none", border:"none", color:C.border, cursor:"pointer", fontSize:15, lineHeight:1, transition:"color 0.15s" }}>×</button>
              <button onClick={()=>setCollapsed(false)} style={{ background:"none", border:"none", color:C.textMuted, cursor:"pointer", fontSize:12, lineHeight:1, padding:"0 2px" }}>▼</button>
            </div>
          </div>
        )}

        {/* ── 펼쳐진 상태 ── */}
        {!collapsed && <>
        {/* Header */}
        <div style={{ display:"flex", alignItems:"center", gap:9, marginBottom:12 }}>
          <button onClick={()=>setShowColorPicker(true)}
            onMouseEnter={e=>{e.target.style.transform="scale(1.3)";e.target.style.opacity=1;}}
            onMouseLeave={e=>{e.target.style.transform="scale(1)";e.target.style.opacity=0.8;}}
            style={{ width:16, height:16, borderRadius:"50%", background:work.color, border:`2px solid ${C.border}`, cursor:"pointer", flexShrink:0, opacity:0.8, transition:"transform 0.15s,opacity 0.15s" }} />
          {editingTitle
            ? <input autoFocus value={titleVal} onChange={e=>setTitleVal(e.target.value)} onBlur={handleTitleBlur} onKeyDown={e=>e.key==="Enter"&&handleTitleBlur()} style={{ background:C.surfaceAlt, border:`1px solid ${work.color}`, borderRadius:7, color:C.text, fontWeight:700, fontSize:15, padding:"2px 9px", width:"100%" }} />
            : <span onClick={()=>setEditingTitle(true)} style={{ color:C.text, fontWeight:700, fontSize:15, cursor:"text", borderBottom:`1px dashed ${C.border}`, paddingBottom:1 }}>{work.title}</span>
          }
          {/* 연재요일 선택 */}
          <div style={{ display:"flex", alignItems:"center", gap:3 }}>
            {DAYS_KO.map((d,i) => (
              <button key={i} onClick={()=>onUpdate({...work, serialDay: work.serialDay===i ? null : i})}
                style={{ width:22, height:22, borderRadius:"50%", border:`1px solid ${work.serialDay===i ? work.color : C.border}`, background:work.serialDay===i ? work.color+"33" : "transparent", color:work.serialDay===i ? work.color : C.textMuted, fontSize:10, fontWeight:work.serialDay===i?700:400, cursor:"pointer", transition:"all 0.15s", flexShrink:0 }}>{d}</button>
            ))}
          </div>
          {/* 연재중/휴재중 토글 */}
          <button onClick={()=>onUpdate({...work, hiatus: !work.hiatus})}
            style={{ flexShrink:0, background:work.hiatus?"#9E7BB518":work.color+"18", border:`1px solid ${work.hiatus?"#9E7BB566":work.color+"66"}`, borderRadius:20, color:work.hiatus?"#9E7BB5":work.color, fontSize:11, fontWeight:700, padding:"3px 10px", cursor:"pointer", transition:"all 0.2s" }}>

            🗓 장기휴재
          </button>
          {activeEp?.deadline && (
            <span style={{ background:dday.urgent?"#F5E8E8":C.surfaceAlt, color:dday.urgent?"#B07070":C.textMuted, border:`1px solid ${dday.urgent?"#DDB8B8":C.border}`, borderRadius:7, padding:"2px 9px", fontSize:11, fontWeight:700, fontFamily:"monospace", flexShrink:0 }}>{dday.label}</span>
          )}
          <button onClick={()=>onDelete(work.id)} onMouseEnter={e=>e.target.style.color="#B07070"} onMouseLeave={e=>e.target.style.color=C.border} style={{ background:"none", border:"none", color:C.border, cursor:"pointer", fontSize:16, lineHeight:1, transition:"color 0.15s" }}>×</button>

          <input
            value={work.summary||""}
            onChange={e=>onUpdate({...work,summary:e.target.value})}
            placeholder="작품 현황 메모..."
            style={{ width:"100%", background:"transparent", border:"none", color:C.text, fontSize:12, padding:0, fontFamily:"inherit" }}
          />
        </div>

        {/* 화수 탭 */}
        <div style={{ display:"flex", gap:4, marginBottom:12, flexWrap:"wrap", alignItems:"center" }}>
        {episodes.filter(ep => !ep.doneAt).map(ep => (
          <div key={ep.id} style={{ display:"flex", alignItems:"center", position:"relative" }}>
            <button onClick={()=>setActiveEpId(ep.id)}
              style={{ background:activeEpId===ep.id?work.color+"22":"transparent", border:`1px solid ${activeEpId===ep.id?work.color+"88":C.border}`, borderRadius:episodes.length>1?"7px 0 0 7px":7, color:activeEpId===ep.id?work.color:C.textMuted, fontWeight:activeEpId===ep.id?700:400, fontSize:11, padding:"3px 9px", cursor:"pointer", transition:"all 0.15s", position:"relative" }}>
              {ep.label}
              {ep.doneAt && <span style={{ position:"absolute", top:-4, right:episodes.length>1?-2:2, width:7, height:7, borderRadius:"50%", background:"#7A9E7E" }} />}
            </button>
            {episodes.length > 1 && (
              <button onClick={()=>removeEpisode(ep.id)} style={{ background:activeEpId===ep.id?work.color+"22":"transparent", border:`1px solid ${activeEpId===ep.id?work.color+"88":C.border}`, borderLeft:"none", borderRadius:"0 7px 7px 0", color:C.textMuted, fontSize:10, padding:"3px 5px", cursor:"pointer", lineHeight:1 }}>×</button>
            )}
          </div>
        ))}
        {showAddEp
          ? <div style={{ display:"flex", alignItems:"center", gap:4 }}>
              <input autoFocus type="number" value={newEpNum} onChange={e=>setNewEpNum(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter") addEpisode(); if(e.key==="Escape") setShowAddEp(false); }}
                placeholder="화수 입력" style={{ width:80, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:7, color:C.text, fontSize:11, padding:"3px 8px" }} />
              <button onClick={addEpisode} style={{ background:C.accent, border:"none", borderRadius:7, color:"#fff", fontSize:11, padding:"3px 9px", cursor:"pointer", fontWeight:700 }}>추가</button>
              <button onClick={()=>setShowAddEp(false)} style={{ background:"transparent", border:`1px solid ${C.border}`, borderRadius:7, color:C.textMuted, fontSize:11, padding:"3px 7px", cursor:"pointer" }}>취소</button>
            </div>
          : <button onClick={()=>setShowAddEp(true)} style={{ background:"transparent", border:`1px dashed ${C.border}`, borderRadius:7, color:C.textMuted, fontSize:11, padding:"3px 8px", cursor:"pointer" }}>+ 화 추가</button>

      {activeEp && <>
        {/* 전체 진행률 */}
        <div style={{ marginBottom:12 }}>

            <span style={{ color:C.textMuted, fontSize:11 }}>전체 진행률</span>
            <span style={{ color:work.color, fontSize:12, fontWeight:700, fontFamily:"monospace" }}>{overall}%</span>
          </div>
          <div style={{ background:C.surfaceAlt, borderRadius:99, height:7, overflow:"hidden", border:`1px solid ${C.borderLight}` }}>
            <div style={{ width:`${overall}%`, height:"100%", background:work.color, borderRadius:99, opacity:0.65, transition:"width 0.4s ease" }} />
          </div>
        </div>

        {/* 페이지 & 마감일 */}

          <span style={{ color:C.textMuted, fontSize:11 }}>완료</span>
          <input type="number" value={activeEp.completedPages} min={0} max={totalPages}
            onChange={e=>updateEp(activeEp.id,{completedPages:Math.max(0,Math.min(totalPages,Number(e.target.value)))})}
            style={{ width:44, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:6, color:C.text, fontFamily:"monospace", fontSize:12, textAlign:"center", padding:"2px 4px" }} />
          <span style={{ color:C.textMuted, fontSize:11 }}>/</span>
          <input type="number" value={totalPages} min={1}
            onChange={e=>{ const n=Math.max(1,Number(e.target.value)); updateEp(activeEp.id,{totalPages:n,completedPages:Math.min(activeEp.completedPages,n),pageCheck:{}}); }}
            style={{ width:44, background:C.surfaceAlt, border:`1px solid ${C.border}`, borderRadius:6, color:C.text, fontFamily:"monospace", fontSize:12, textAlign:"center", padding:"2px 4px" }} />
          <span style={{ color:C.textMuted, fontSize:11 }}>p</span>
          <span style={{ marginLeft:"auto", color:C.textMuted, fontSize:11 }}>현재 <span style={{ color:work.color, fontWeight:700 }}>{getAutoCurrentStage(sp)}</span></span>

        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
          <span style={{ color:C.textMuted, fontSize:11 }}>마감일</span>
          <input type="date" value={activeEp.deadline||""}
            onChange={e=>updateEp(activeEp.id,{deadline:e.target.value})}

            ? <span style={{ marginLeft:"auto", color:"#7A9E7E", fontSize:11, fontWeight:700 }}>✓ 완료</span>
            : <button onClick={markDone} style={{ marginLeft:"auto", background:"transparent", border:`1px solid ${C.border}`, borderRadius:7, color:C.textMuted, fontSize:10, padding:"2px 9px", cursor:"pointer" }}>화 완료 처리</button>
